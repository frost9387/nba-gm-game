<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NBA GM ENGINE — Saison 2026-27</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0d14; --bg2:#0e1320; --panel:#141b2b; --panel2:#1a2336; --panel3:#202b42;
  --line:#26324c; --line2:#33415f;
  --txt:#edf1f9; --mut:#8b97ad; --dim:#5d6880;
  --teal:#17d3a2; --teal-d:#0e8e6d; --gold:#f7d633; --red:#e0353b; --blue:#2e63b8; --blue-d:#1d3f78;
  --orange:#ff8a2a;
  --disp:'Oswald','Arial Narrow',Arial,sans-serif;
  --body:'Inter',-apple-system,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--txt);font-family:var(--body);font-size:14px;
  background-image:radial-gradient(1200px 500px at 70% -10%, #14213b66, transparent),
                   radial-gradient(900px 400px at -10% 110%, #1a0f2a55, transparent);
  background-attachment:fixed; padding-bottom:64px;}
::-webkit-scrollbar{height:8px;width:8px}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px}
h1,h2,h3,.disp{font-family:var(--disp);text-transform:uppercase;letter-spacing:.04em}

/* ---- Barre supérieure ---- */
#topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px;
  background:linear-gradient(180deg,#10182a,#0b1019);border-bottom:1px solid var(--line);
  padding:10px 14px;}
#brand{display:flex;align-items:baseline;gap:6px;font-family:var(--disp);font-weight:700;font-size:20px;white-space:nowrap}
#brand .my{font-style:italic;font-weight:400;color:var(--txt)}
#brand .gm{color:var(--gold)}
#phasechip{font-family:var(--disp);font-size:12px;letter-spacing:.08em;color:#0a0d14;background:var(--teal);
  padding:3px 10px;text-transform:uppercase;font-weight:600;clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%)}
#topinfo{margin-left:auto;display:flex;gap:14px;font-size:12px;color:var(--mut);white-space:nowrap;overflow:hidden}
#topinfo b{color:var(--gold);font-family:var(--disp);font-size:14px;font-weight:600}

/* ---- Onglets ---- */
#tabs{display:flex;gap:2px;overflow-x:auto;background:#0b101b;border-bottom:1px solid var(--line);padding:0 8px;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tab{font-family:var(--disp);font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);
  padding:11px 14px;border:0;background:transparent;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;font-weight:500}
.tab.on{color:#fff;border-bottom-color:var(--teal)}
.tab:disabled{opacity:.3;cursor:default}
.tab .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--red);margin-left:5px;vertical-align:2px}

/* ---- Conteneur ---- */
#view{max-width:1100px;margin:0 auto;padding:14px 12px 30px}
.panel{background:linear-gradient(180deg,var(--panel),#10172699);border:1px solid var(--line);margin-bottom:14px}
.panel>.ph{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--line);background:#11192b}
.panel>.ph h2{font-size:14px;font-weight:600;color:#fff}
.panel>.ph .sub{font-size:11px;color:var(--mut);text-transform:none;font-family:var(--body);letter-spacing:0}
.panel>.pb{padding:12px}
.sec-tag{font-family:var(--disp);font-size:10px;letter-spacing:.14em;color:#0a0d14;background:var(--gold);padding:2px 7px;font-weight:600}
.sec-tag.b{background:var(--teal)} .sec-tag.c{background:#8b97ad}

/* ---- Héros joueur / équipe (style 2K) ---- */
.hero{display:flex;align-items:flex-end;gap:16px;padding:18px 14px 12px;flex-wrap:wrap}
.hero .fname{font-family:var(--disp);color:var(--gold);font-size:16px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;line-height:1}
.hero .lname{font-family:var(--disp);color:#fff;font-size:42px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;line-height:.95}
.hero .meta{display:flex;gap:18px;margin-left:auto;flex-wrap:wrap}
.hero .meta .m{text-align:left}
.hero .meta .ml{font-family:var(--disp);font-size:10px;letter-spacing:.12em;color:var(--mut);text-transform:uppercase}
.hero .meta .mv{font-family:var(--disp);font-size:19px;color:var(--gold);font-weight:600}

/* ---- Tableaux ---- */
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-family:var(--disp);font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);
  text-align:left;padding:7px 8px;border-bottom:1px solid var(--line2);background:#0d1322;white-space:nowrap;position:sticky;top:0}
td{padding:7px 8px;border-bottom:1px solid #1c2740;white-space:nowrap;font-variant-numeric:tabular-nums}
tr.rowc{cursor:pointer} tr.rowc:active,tr.rowc:hover{background:#1b2742}
tr.sel{background:linear-gradient(90deg,var(--teal),#10b88c)!important}
tr.sel td{color:#06251c;font-weight:700;border-bottom-color:transparent}
td.num,th.num{text-align:right}
.pname{font-weight:600;color:#fff}
.pos-chip{display:inline-block;font-family:var(--disp);font-size:10px;font-weight:600;color:#0a0d14;background:#aab6cc;padding:1px 6px;margin-right:6px;min-width:24px;text-align:center}
.gold{color:var(--gold)} .teal{color:var(--teal)} .red{color:var(--red)} .mut{color:var(--mut)} .orange{color:var(--orange)}
.fire{color:var(--orange)} 
.epm-pos{color:var(--teal);font-weight:700}.epm-neg{color:var(--red);font-weight:600}.epm-mid{color:var(--gold)}

/* ---- Barres de minutes (style 2K sliders) ---- */
.mbar{display:inline-block;width:90px;height:9px;background:#0c1220;border:1px solid var(--line2);vertical-align:middle;margin-right:7px;position:relative}
.mbar>i{display:block;height:100%;background:linear-gradient(90deg,#d7dee9,#fff);box-shadow:inset -1px 0 0 #999}
.mbar::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0 21%,#0c1220 21% 23%)}

/* ---- Boutons ---- */
.btn{font-family:var(--disp);font-size:13px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
  border:1px solid var(--line2);background:var(--panel3);color:var(--txt);padding:10px 16px;cursor:pointer;
  clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);transition:filter .1s}
.btn:hover{filter:brightness(1.2)}
.btn.p{background:var(--teal);border-color:var(--teal);color:#06251c}
.btn.g{background:var(--gold);border-color:var(--gold);color:#1c1604}
.btn.r{background:var(--red);border-color:var(--red);color:#fff}
.btn.sm{font-size:11px;padding:6px 12px}
.btn:disabled{opacity:.35;cursor:default;filter:none}
.btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}

/* ---- Cartes équipes (sélection) ---- */
#teamgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.tcard{position:relative;border:1px solid var(--line);background:var(--panel2);padding:12px 10px;cursor:pointer;overflow:hidden;text-align:left}
.tcard:hover{border-color:var(--teal)}
.tcard .bar{position:absolute;left:0;top:0;bottom:0;width:5px}
.tcard .ab{font-family:var(--disp);font-size:22px;font-weight:700;color:#fff}
.tcard .nm{font-size:11px;color:var(--mut)}
.tcard .ep{font-size:11px;margin-top:4px}.tcard .ep b{color:var(--gold)}

/* ---- Alertes / news ---- */
.alert-med{border:1px solid var(--red);background:linear-gradient(180deg,#2a0d10,#1a090b);padding:12px;margin:10px 0}
.alert-med h3{color:#ff6b6e;font-size:15px;margin-bottom:6px}
.woj{border-left:4px solid var(--red);background:#1c1020;padding:9px 12px;margin:7px 0;font-size:13px}
.woj b{color:#ff8a8d}
.newsitem{border-left:3px solid var(--line2);padding:7px 12px;margin:6px 0;font-size:13px;color:#cfd7e6;background:#121a2c}
.newsitem.t{border-left-color:var(--teal)} .newsitem.g{border-left-color:var(--gold)}

/* ---- Bracket playoffs (style 2K image 1) ---- */
#bracketwrap{overflow-x:auto;padding:10px 4px}
.bracket{display:grid;grid-auto-flow:column;gap:18px;min-width:860px}
.bcol{display:flex;flex-direction:column;justify-content:space-around;gap:14px}
.bcol h3{font-size:11px;color:var(--mut);text-align:center;letter-spacing:.12em}
.match{background:linear-gradient(180deg,var(--blue),var(--blue-d));border:1px solid #3f74c9;padding:3px;min-width:170px}
.match .trow{display:flex;align-items:center;gap:6px;background:#0d1424ee;padding:5px 7px;margin:2px}
.match .trow.win{outline:1px solid var(--gold)}
.seed{font-family:var(--disp);font-size:11px;font-weight:700;color:#0a0d14;background:var(--gold);min-width:20px;text-align:center;padding:1px 0}
.match .tn{font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:.04em}
.match .sc{margin-left:auto;font-family:var(--disp);font-weight:700;color:var(--gold)}
.match .tbar{width:4px;align-self:stretch}

/* ---- Barre du bas (légende 2K + ticker) ---- */
#botbar{position:fixed;left:0;right:0;bottom:0;z-index:60;display:flex;align-items:center;gap:10px;
  background:linear-gradient(180deg,#0d1322f2,#080c14f8);border-top:1px solid var(--line);padding:8px 12px;backdrop-filter:blur(6px)}
#botbar .hint{font-family:var(--disp);font-size:11px;letter-spacing:.08em;color:var(--mut);text-transform:uppercase;white-space:nowrap}
#botbar .hint b{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;
  background:#222d45;color:#fff;font-size:10px;margin-right:5px;border:1px solid var(--line2)}
#ticker{flex:1;overflow:hidden;white-space:nowrap;font-size:12px;color:#cfd7e6}
#ticker span{display:inline-block;padding-left:100%;animation:tick 28s linear infinite}
@keyframes tick{to{transform:translateX(-100%)}}

/* ---- Modal ---- */
#modal{position:fixed;inset:0;z-index:100;background:#05070cd9;display:none;align-items:flex-end;justify-content:center}
#modal.on{display:flex}
#mbox{background:var(--panel);border:1px solid var(--line2);width:100%;max-width:720px;max-height:88vh;overflow-y:auto;padding:0 0 14px}
#mbox .mh{position:sticky;top:0;display:flex;align-items:center;background:#11192b;border-bottom:1px solid var(--line);padding:10px 12px;z-index:2}
#mbox .mh h3{font-size:15px}
#mbox .mh .x{margin-left:auto;background:none;border:0;color:var(--mut);font-size:22px;cursor:pointer;line-height:1}
#mbox .mc{padding:12px}

/* ---- Form ---- */
select,input[type=number],input[type=text]{background:#0d1322;border:1px solid var(--line2);color:var(--txt);
  padding:9px 10px;font-family:var(--body);font-size:14px;width:100%}
label.fl{display:block;font-family:var(--disp);font-size:10px;letter-spacing:.1em;color:var(--mut);text-transform:uppercase;margin:10px 0 4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(86px,1fr));gap:8px;margin:8px 0}
.statbox{background:#0e1525;border:1px solid var(--line);padding:8px;text-align:center}
.statbox .l{font-family:var(--disp);font-size:9.5px;letter-spacing:.1em;color:var(--mut);text-transform:uppercase}
.statbox .v{font-family:var(--disp);font-size:18px;font-weight:600;color:var(--gold)}
.statbox .v.t{color:var(--teal)} .statbox .v.r{color:var(--red)} .statbox .v.w{color:#fff}

.chkline{display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid #1c2740;font-size:13px}
.chkline input{width:auto}
.tag{display:inline-block;font-family:var(--disp);font-size:10px;letter-spacing:.06em;padding:1px 7px;border:1px solid var(--line2);color:var(--mut);text-transform:uppercase;margin-left:6px}
.tag.gold{border-color:var(--gold);color:var(--gold)}
.tag.red{border-color:var(--red);color:var(--red)}
.tag.teal{border-color:var(--teal);color:var(--teal)}

@media (max-width:640px){
  .hero .lname{font-size:30px}
  .hero .meta{gap:12px;margin-left:0}
  #topinfo{display:none}
  .grid2,.grid3{grid-template-columns:1fr}
  .btn{padding:11px 14px}
  td,th{padding:7px 6px;font-size:12.5px}
}
</style>
</head>

// ============ Accès roster / finances ============
function roster(ab){ return Object.values(S.players).filter(p=>p.tm===ab); }
function payroll(ab){ return roster(ab).reduce((s,p)=>s+p.sal,0); }

function fmtM(v){ return (v/1000000).toFixed(1).replace('.',',')+' M$'; }
function effEpm(p){ let e=p.epm - p.fatigue; if(p.inj) e-=0.4; return e; }
function potential(p){
  // Potentiel = âge × niveau actuel × courbe de progression 2021-26 (champ tr, -1..+1)
  const tr = p.tr||0;
  let pot;
  if(p.age<=21 && p.epm>=1) pot=3;
  else if(p.age<=23 && p.epm>=2.5) pot=3;
  else if(p.age<=23) pot=2;
  else if(p.age<=26 && p.epm>=1) pot=2;
  else if(p.age<=27) pot=1;
  else pot=0;
  if(tr>=0.35 && pot<3 && p.age<=26) pot++;      // trajectoire ascendante nette
  if(tr<=-0.35 && pot>0) pot--;                   // stagnation/déclin avéré
  return pot;
}
const POT_LABEL=['Faible','Moyen','Élevé','Élite'];

// ============ Minutes & Force ============
function autoMinsTemplate(ab, playoffs){
  const rs = roster(ab).filter(p=>!p.inj).sort((a,b)=>effEpm(b)-effEpm(a));
  const tmpl = playoffs
    ? [40,38,36,33,30,24,18,12,6,3,0,0,0,0,0]    // rotation playoffs : 9-10 joueurs, stars à 40
    : [36,34,32,30,28,24,20,15,10,5,3,1,1,1,0];  // somme 240 : la star joue ses vraies minutes
  const out={};
  rs.forEach((p,i)=>{ let m = i<tmpl.length?tmpl[i]:0;
    if(p.age>=36) m=Math.min(m, playoffs?36:30);
    out[p.id]=m; });
  return out;
}
function minutesAlloc(ab, playoffs){
  // Rotation manuelle de l'utilisateur si définie, sinon gabarit automatique.
  let out=null;
  if(ab===S.user && S.userMins){
    out={};
    const rs = roster(ab).filter(p=>!p.inj);
    for(const p of rs) out[p.id] = clamp(S.userMins[p.id]!=null? S.userMins[p.id] : 0, 0, 42);
    // si la rotation saisie est vide (nouveaux joueurs, blessures), repli auto
    if(Object.values(out).reduce((s,v)=>s+v,0) < 120) out=null;
  }
  if(!out) out = autoMinsTemplate(ab, playoffs);
  // Ajustement à 240 en respectant les consignes :
  //  - déficit : comblé au prorata de la marge restante (le banc absorbe, pas la star)
  //  - excès : trim proportionnel aux minutes ; plafond dur 42
  for(let pass=0; pass<4; pass++){
    let tot=0; for(const id in out) tot+=out[id];
    const diff = 240-tot;
    if(Math.abs(diff)<0.05) break;
    if(diff>0){
      let head=0; for(const id in out) head += Math.max(0, 42-out[id]);
      if(head<=0) break;
      for(const id in out) out[id] = Math.min(42, out[id] + diff*Math.max(0,42-out[id])/head);
    } else {
      let tot2=0; for(const id in out) tot2+=out[id];
      const k = 240/tot2;
      for(const id in out) out[id]=Math.min(42, out[id]*k);
    }
  }
  for(const id in out) out[id]=Math.round(out[id]*10)/10;
  return out;
}
function setUserMin(id, delta){
  if(!S.userMins) S.userMins = autoMinsTemplate(S.user, false);
  // intégrer les joueurs absents de la rotation enregistrée
  for(const p of roster(S.user)) if(S.userMins[p.id]==null) S.userMins[p.id]=0;
  S.userMins[id] = clamp(Math.round((S.userMins[id]||0) + delta), 0, 42);
}
function resetUserMins(){ S.userMins = null; }
function lockerMorale(ab){
  const rs = roster(ab); if(!rs.length) return 60;
  return rs.reduce((s,p)=>s+p.morale,0)/rs.length;
}
function lockerMod(ab){
  // Ambiance du vestiaire : un groupe soudé joue au-dessus de sa valeur, un vestiaire
  // en crise coûte des victoires (±0,3 de force ≈ ±1,8 pt/match).
  return clamp((lockerMorale(ab)-62)*0.0065, -0.32, 0.24);
}
function teamForce(ab, offS, defS){
  const mins = minutesAlloc(ab); let f=0;
  for(const id in mins) f += effEpm(S.players[id]) * mins[id];
  f = f/240; // EPM moyen pondéré par les minutes (vraie moyenne)
  f *= S.alch[ab];
  f += lockerMod(ab);
  if(offS||defS) f += strategyMod(ab, offS, defS).total;
  return f;
}
// Profil d'effectif pour le moteur tactique
function teamProfile(ab){
  const rs = roster(ab).filter(p=>!p.inj).sort((a,b)=>effEpm(b)-effEpm(a)).slice(0,9);
  const by = pos => rs.filter(p=>p.pos===pos);
  const avg=(arr,f)=>arr.length?arr.reduce((s,p)=>s+f(p),0)/arr.length:0;
  const shoot = avg(rs.filter(p=>p.c.fg3>0), p=>p.c.fg3);
  const bigsO = Math.max(0,...by('C').concat(by('PF')).map(p=>p.oe||0));
  const bigD  = Math.max(0,...by('C').map(p=>p.de||0));
  const bigBlk= Math.max(0,...by('C').map(p=>p.c.blk/Math.max(p.c.min,10)*36));
  const mobility = rs.filter(p=>(p.de||0)>0.4 && p.pos!=='C').length;
  const guards = by('PG').concat(by('SG'));
  const gO = avg(guards, p=>p.oe||0), gD = avg(guards, p=>p.de||0), gStl=avg(guards,p=>p.c.stl);
  const passing = avg(rs, p=>p.c.ast);
  const topShare = rs.length? (effEpm(rs[0])+3.5)/rs.reduce((s,p)=>s+effEpm(p)+3.5,0):0;
  return {shoot,bigsO,bigD,bigBlk,mobility,gO,gD,gStl,passing,topShare,nC:by('C').length};
}
function strategyMod(ab, offS, defS){
  const P = teamProfile(ab); let off=0, def=0; const notes=[];
  if(offS==="Small Ball"){ off = (P.shoot>0.355 && P.mobility>=4)? 0.8 : (P.shoot>0.34? 0.3 : -0.5);
    if(off<0) notes.push("effectif trop lourd pour le Small Ball"); }
  else if(offS==="7 Seconds or Less"){ off = (P.gO>1.2)? 0.7 : (P.gO>0.3? 0.2 : -0.5);
    if(off<0) notes.push("backcourt trop limité pour le SSOL"); }
  else if(offS==="Pace and Space"){ off = (P.shoot>0.36)? 1.0 : (P.shoot>0.345? 0.4 : -0.4);
    if(off<0) notes.push("adresse extérieure insuffisante"); }
  else if(offS==="Post-Up"){ off = (P.bigsO>2.2)? 0.9 : (P.bigsO>1.0? 0.2 : -0.5);
    if(off<0) notes.push("aucun joueur d'impact intérieur : Post-Up inadapté"); }
  else if(offS==="Princeton"){ off = (P.passing>2.6 && P.topShare<0.16)? 0.7 : 0.0; }
  else if(offS==="Triangle"){ off = (P.passing>2.4 && P.bigsO>1.2)? 0.6 : -0.2; }
  if(defS==="Switch"){ def = (P.mobility>=5)? 0.8 : (P.mobility>=3? 0.2 : -0.5);
    if(def<0) notes.push("pas assez de défenseurs mobiles pour switcher"); }
  else if(defS==="Drop Coverage"){ def = (P.bigBlk>1.6 && P.bigD>1.0)? 0.9 : (P.bigD>0.3? 0.3 : -0.4);
    if(def<0) notes.push("pivot incapable de protéger le cercle en drop"); }
  else if(defS==="Blitz / Trap"){ def = (P.gStl>1.0 && P.gD>0.3)? 0.6 : -0.3;
    if(def<0) notes.push("lignes arrières trop tendres pour blitzer"); }
  else if(defS==="Ice / Blue"){ def = (P.gD>0.5)? 0.5 : 0.0; }
  return {off,def,total:off+def,notes};
}

// ============ Projection statistique (carrière × EPM) ============
// Coeur du réalisme : per-36 carrière + modulation EPM + faible échantillon -> archétype EPM
const ARCH = {PG:{pts:16,reb:3.6,ast:6.4,stl:1.2,blk:0.3,tov:2.6,fg:.445,fg3:.355,ft:.82},
  SG:{pts:16.5,reb:3.8,ast:3.2,stl:1.0,blk:0.3,tov:1.9,fg:.45,fg3:.365,ft:.81},
  SF:{pts:15,reb:5.4,ast:2.8,stl:1.0,blk:0.5,tov:1.8,fg:.465,fg3:.355,ft:.78},
  PF:{pts:14.5,reb:7.2,ast:2.4,stl:0.8,blk:0.8,tov:1.7,fg:.50,fg3:.34,ft:.75},
  C:{pts:14,reb:9.6,ast:2.0,stl:0.7,blk:1.5,tov:1.7,fg:.57,fg3:.27,ft:.70}};
function per36(p){
  const c=p.c, m=Math.max(c.min,8), f=36/m;
  let b={pts:c.pts*f,reb:c.reb*f,ast:c.ast*f,stl:c.stl*f,blk:c.blk*f,tov:c.tov*f,fg:c.fg,fg3:c.fg3,ft:c.ft};
  if(c.gp<60){ // faible échantillon : on s'appuie sur l'EPM (consigne)
    const a=ARCH[p.pos]||ARCH.SF, w=clamp(c.gp/60,0,1);
    const lvl = clamp((p.epm+2.5)/4,0.4,1.6);
    for(const k of ['pts','reb','ast','stl','blk','tov']) b[k]=b[k]*w + a[k]*lvl*(1-w);
    b.fg=b.fg*w+a.fg*(1-w); b.fg3=b.fg3*w+a.fg3*(1-w); b.ft=b.ft*w+a.ft*(1-w);
  }
  // Modulation EPM : écart entre l'EPM réel et le niveau qu'impliquent les stats carrière
  const implied = (b.pts*0.12+b.reb*0.13+b.ast*0.17+b.stl*0.8+b.blk*0.5-b.tov*0.35)*(0.55+0.45*clamp(m/34,0,1)) - 2.6;
  const delta = clamp((p.epm - implied)*0.5, -1.6, 1.6);
  // Baselines = forme récente 2022-26 : le kicker EPM ne sert plus qu'à l'ajustement fin
  b.pts*= 1+delta*0.02; b.ast*=1+delta*0.022; b.reb*=1+delta*0.015;
  b.fg = clamp(b.fg*(1+(p.oe||0)*0.012+delta*0.012), .37, .68);
  b.fg3= b.fg3>0.05? clamp(b.fg3*(1+(p.oe||0)*0.012), .25, .45):b.fg3;
  // Cohérence shot-selection : profil défensif sans attaque -> pourcentages plafonnés
  if((p.de||0)>1.2 && (p.oe||0)<0){ b.fg=Math.min(b.fg,.52); b.fg3=Math.min(b.fg3,.36); }
  return b;
}
function projectGame(p, min, paceMod){
  const b = per36(p), f=min/36*(paceMod||1);
  const g={min};
  // Heat check : ~3,5% des matchs = explosion (×1,5-2,0), ~8,5% = gros match (×1,22-1,44)
  const hr = rnd();
  const hot = hr<0.045 ? 1.5+rnd()*0.5 : hr<0.135 ? 1.22+rnd()*0.22 : 1;
  g.pts = Math.max(0, b.pts*0.96*f*hot*(1+rgauss()*0.24));
  g.reb = Math.max(0, b.reb*f*(rnd()<0.05?1.35+rnd()*0.4:1)*(1+rgauss()*0.24));
  g.ast = Math.max(0, b.ast*f*(rnd()<0.05?1.4+rnd()*0.5:1)*(1+rgauss()*0.28));
  g.stl = Math.max(0, b.stl*f*(1+rgauss()*0.35));
  g.blk = Math.max(0, b.blk*f*(1+rgauss()*0.35));
  g.tov = Math.max(0, b.tov*f*(1+rgauss()*0.25));
  const efg = clamp(b.fg*(1+(hot-1)*0.25)*(1+rgauss()*0.07), .30,.78);
  const ftShare = clamp(0.18+(b.ft-0.7)*0.2,0.08,0.3);
  g.ftm = g.pts*ftShare; g.fta = b.ft>0? g.ftm/clamp(b.ft,.5,.95):0;
  const ptsFG = g.pts-g.ftm;
  const tpShare = b.fg3>0.2? clamp((b.fg3-0.25)*1.8,0.05,0.55):0.02;
  g.tpm = ptsFG*tpShare/3; g.tpa = b.fg3>0.1? g.tpm/clamp(b.fg3*(1+rgauss()*0.1),.2,.5):0;
  g.fgm = (ptsFG-3*g.tpm)/2 + g.tpm; g.fga = g.fgm/efg;
  for(const k in g) g[k]=Math.round(g[k]*10)/10;
  return g;
}
function addStat(acc, g){ acc.gp++; for(const k of ['min','pts','reb','ast','stl','blk','tov','fgm','fga','tpm','tpa','ftm','fta']) acc[k]+=g[k]||0; }
function avgStat(a){ const n=Math.max(a.gp,1);
  return {gp:a.gp, mpg:a.min/n, ppg:a.pts/n, rpg:a.reb/n, apg:a.ast/n, spg:a.stl/n, bpg:a.blk/n, topg:a.tov/n,
    fg:a.fga>0?a.fgm/a.fga:0, fg3:a.tpa>0?a.tpm/a.tpa:0, ft:a.fta>0?a.ftm/a.fta:0};
}

// ============ Développement (Training Camp + saison) ============
function campProgress(p){
  // Âge 19-23 : +0.1 à +0.3 (×1.5 si potentiel élite) ; 34+ : -0.1 à -0.2
  // La courbe de progression 2021-26 (p.tr) amplifie ou freine l'évolution.
  const tr = p.tr||0;
  let d=0;
  if(p.age<=23 && p.age>=19){ d = 0.1+rnd()*0.2; if(potential(p)===3) d*=1.5; if(potential(p)===2) d*=1.2; d *= (1+tr*0.5); }
  else if(p.age<=27){ d = (rnd()<0.35+tr*0.2? 0.05+rnd()*0.1 : 0) + (tr<-0.4&&chance(0.3)?-0.1:0); }
  else if(p.age>=34){ d = -(0.1+rnd()*0.1); if(tr<-0.2) d-=0.05; if(tr>0.3) d*=0.6; }
  else if(p.age>=31){ d = (rnd()<0.4-tr*0.2? -(0.05+rnd()*0.08):0); }
  return Math.round(d*10)/10;
}
// Facteur de développement lié au temps de jeu réel de la saison écoulée :
// un jeune à fort potentiel qui joue beaucoup progresse nettement plus vite
// qu'un joueur scotché au banc. Ne s'applique qu'aux progressions (d>0).
function devMinutesFactor(p){
  const gp = p.season ? p.season.gp : 0;
  if(!gp) return 0.7; // n'a pas joué : développement ralenti
  const mpg = p.season.min/gp;
  const potW = 0.4 + 0.2*potential(p);            // 0.4 (faible) → 1.0 (élite)
  return clamp(1 + (clamp(mpg,4,38)-22)/22 * 0.55 * potW, 0.55, 1.45);
}
// Répartition O/D d'une variation d'EPM selon le profil du joueur :
// un profil défensif (de>oe) progresse/régresse d'abord en défense, et inversement.
function splitOD(p, d){
  const defProfile = (p.de||0) > (p.oe||0);
  const wO = d>=0 ? (defProfile?0.4:0.65) : (defProfile?0.35:0.55);
  return {dO: Math.round(d*wO*10)/10, dD: Math.round(d*(1-wO)*10)/10};
}
function runTrainingCamp(){
  const rows=[];
  for(const p of Object.values(S.players)){
    if(p.tm==='FA') continue;
    const d = campProgress(p);
    const before = p.epm;
    const sp = splitOD(p, d);
    p.oe = Math.round((p.oe + sp.dO)*10)/10;
    p.de = Math.round((p.de + sp.dD)*10)/10;
    p.epm = Math.round((p.oe + p.de)*10)/10;
    if(p.tm===S.user) rows.push({n:p.n, before, d, after:p.epm});
  }
  S.campDone = true;
  rows.sort((a,b)=>b.d-a.d);
  return rows;
}

// ============ EPM = résultante des statistiques (post 2025-26) ============
// À partir des saisons simulées, l'EPM est recalculé depuis les stats réelles du joueur,
// et non l'inverse. Calibré pour : volume+efficacité → O-EPM ; stocks+rebond → D-EPM.
function epmFromStats(p){
  const s = p.season, a = avgStat(s);
  if(s.gp < 20 || a.mpg < 8) return null; // échantillon insuffisant : courbe d'âge seule
  const per36 = v => v * 36 / Math.max(a.mpg, 1); // depuis les moyennes par match
  const fgaG = s.fga/s.gp, ftaG = s.fta/s.gp;
  const ts = (fgaG + 0.44*ftaG) > 0 ? a.ppg / (2*(fgaG + 0.44*ftaG)) : 0.5;
  const oe = clamp(
      (per36(a.ppg) - 16) * 0.16
    + (ts - 0.565) * 14
    + per36(a.apg) * 0.22
    - per36(a.topg) * 0.38
    + 0.3, -5, 7.5);
  const de = clamp(
      (per36(a.spg) - 1.1) * 0.9
    + (per36(a.bpg) - 0.7) * 1.0
    + (per36(a.rpg) - 6.5) * 0.10
    + ((p.pos==='C'||p.pos==='PF') ? 0.15 : 0), -4, 5);
  return {oe: Math.round(oe*10)/10, de: Math.round(de*10)/10};
}

// ============ OVR (note style 2K, traduction directe des stats) ============
function ovr(p){
  const a = (p.season && p.season.gp >= 10) ? avgStat(p.season) : p.c;
  const min = a.min || p.c.min || 12;
  const per36 = v => (v||0) * 36 / Math.max(min, 6);
  const ts = ((a.fga||0) + 0.44*(a.fta||0)) > 0 ? a.pts/(2*(a.fga+0.44*a.fta)) : (p.c.fg||0.5)+0.05;
  const v = 56
    + per36(a.pts) * 0.85
    + per36(a.reb) * 0.50
    + per36(a.ast) * 0.60
    + per36(a.stl) * 1.6
    + per36(a.blk) * 1.6
    - per36(a.tov) * 0.5
    + (ts - 0.5) * 26
    + Math.min(min, 36) * 0.12;
  return clamp(Math.round(v), 60, 99);
}

// ============ Stratégies IA (meilleur fit selon Stratégies_NBA) ============
function aiStrategy(ab){
  if(!S.stratCache) S.stratCache={};
  if(S.stratCache[ab]) return S.stratCache[ab];
  let best={off:OFF_STRATS[2],def:DEF_STRATS[1],v:-99};
  for(const o of OFF_STRATS) for(const d of DEF_STRATS){
    const m=strategyMod(ab,o,d);
    if(m.total>best.v) best={off:o,def:d,v:m.total};
  }
  S.stratCache[ab]=best; return best;
}
function invalidateStrat(ab){ if(!S.stratCache) S.stratCache={}; delete S.stratCache[ab]; }
function stratOf(ab){
  if(ab===S.user && S.strategies.off) return S.strategies;
  return aiStrategy(ab);
}

// ============ per36 memoisé ============
function b36(p){
  const k = p.epm+'|'+p.fatigue+'|'+(p.oe||0);
  if(p._bk!==k){ p._b36=per36(p); p._bk=k; }
  return p._b36;
}

// ============ Blessures (âge × passif historique de blessures_nba_global.csv) ============
function injRiskPerGame(p, mpg){
  let r = (p.age/20)*0.0042;
  r *= 1 + (p.ih||0)*0.55;   // passif : ih 0-3 issu du CSV → jusqu'à ×2.65
  if(mpg>34) r+=0.0012;
  if(p.age>=34) r*=1.3;
  return clamp(r,0.001,0.024);
}
function rollInjury(p){
  const t = pick(INJ_TYPES);
  let games = Math.round(t[1]*3 + rnd()*(t[2]-t[1])*3.5)+1;
  if((p.ih||0)>=2) games = Math.round(games*1.3); // passif lourd : récupération plus lente
  p.inj = {type:t[0], games, total:games};
  return p.inj;
}
function healDay(){
  for(const p of Object.values(S.players)){
    if(p.inj){ p.inj.games-=0.5; if(p.inj.games<=0){ p.inj=null; } }
  }
}

// ============ Calendrier & simulation ============
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function paceMod(offS){ return offS==="7 Seconds or Less"?1.06: offS==="Pace and Space"?1.04: offS==="Small Ball"?1.03: offS==="Post-Up"?0.95: offS==="Triangle"?0.97:1.0; }

/*ENGINE_START*/
// Modèle de match calibré : écart-type des bilans ~12, corrélation force↔victoires ~0.87,
// meilleure équipe ~64-66 W, pire ~18-20 W (cf. recherche de grille de calibration).
const FORCE_PTS = 6.0;   // conversion force (EPM moyen) -> points de net rating
const GAME_HCA  = 2.4;   // avantage du terrain (points)
const GAME_NOISE = 22.0; // amplitude du bruit match (× rgauss, écart-type effectif ~12.7 pts)
/*ENGINE_END*/
function simGame(a, b, opts){
  opts=opts||{};
  const sa=stratOf(a), sb=stratOf(b);
  let fa=teamForce(a,sa.off,sa.def), fb=teamForce(b,sb.off,sb.def);
  fa += opts.bonusA||0; fb += opts.bonusB||0;
  const hca = opts.neutral? 0 : GAME_HCA;
  const margin0 = (fa-fb)*FORCE_PTS + hca + rgauss()*GAME_NOISE;
  const win = margin0>=0 ? a : b;
  const base = 112 + (paceMod(sa.off)+paceMod(sb.off)-2)*55;
  const margin = clamp(Math.round(Math.abs(margin0)), 1, 40);
  const wsc = Math.round(base + rgauss()*7.5 + margin/2);
  const lsc = wsc - margin;
  const res = {a,b, sa:win===a?wsc:lsc, sb:win===b?wsc:lsc, win};
  if(!opts.noStats){
    statsForTeam(a, res.sa, paceMod(sa.off), opts.playoffs);
    statsForTeam(b, res.sb, paceMod(sb.off), opts.playoffs);
  }
  if(opts.box){ res.boxA=lastBox.a; res.boxB=lastBox.b; }
  return res;
}
let lastBox={a:null,b:null};
function statsForTeam(ab, teamPts, pm, playoffs){
  const mins = minutesAlloc(ab, playoffs);
  const lines=[]; let raw=0;
  for(const id in mins){
    if(mins[id]<=0) continue;
    const p=S.players[id];
    const g=projectGame(p, mins[id], pm);
    lines.push([p,g]); raw+=g.pts;
  }
  // Renormalisation protectrice : un carton individuel n'est jamais écrasé pour coller
  // au score d'équipe — ce sont les coéquipiers qui prennent moins de tirs ce soir-là.
  const k = raw>0? teamPts/raw : 1;
  const box=[];
  if(k < 1){
    const deficit = raw - teamPts;
    let wsum = 0;
    for(const [p,g] of lines){ g._w = g.pts * (g.pts>=38 ? 0.25 : 1); wsum += g._w; }
    for(const [p,g] of lines){
      const cut = wsum>0 ? deficit * g._w/wsum : 0;
      const r = g.pts>0 ? Math.max(0, g.pts-cut)/g.pts : 1;
      delete g._w;
      for(const f of ['pts','fgm','fga','tpm','tpa','ftm','fta']) g[f]=Math.round(g[f]*r*10)/10;
    }
  } else {
    for(const [p,g] of lines)
      for(const f of ['pts','fgm','fga','tpm','tpa','ftm','fta']) g[f]=Math.round(g[f]*k*10)/10;
  }
  for(const [p,g] of lines){
    if(g.fgm>g.fga) g.fga=g.fgm; if(g.tpm>g.tpa) g.tpa=g.tpm; if(g.ftm>g.fta) g.fta=g.ftm;
    addStat(playoffs? p.playoffs : p.season, g);
    box.push({n:p.n, pos:p.pos, id:p.id, ...g});
  }
  box.sort((x,y)=>y.pts-x.pts);
  if(lastBox.a===null||lastBox._t!==S._gameTick) { lastBox={a:box, b:null, _t:S._gameTick}; }
  else lastBox.b=box;
}

function prepBlock(){
  const len = S.blockPlan[S.blockIdx];
  S.curBlock = {len, day:0, startW:S.standings[S.user].w, startL:S.standings[S.user].l};
  S.stratCache={};
}
// Simule le bloc courant ; s'interrompt si blessure côté utilisateur
function simBlock(){
  const cb=S.curBlock, abs=Object.keys(DATA.teams);
  while(cb.day < cb.len){
    S._gameTick = S.blockIdx*100+cb.day;
    const arr = shuffle([...abs]);
    let userInjury=null;
    for(let i=0;i<arr.length;i+=2){
      const r = simGame(arr[i], arr[i+1]);
      S.standings[r.win].w++; S.standings[r.win===r.a?r.b:r.a].l++;
      S.seasonGames[r.a]++; S.seasonGames[r.b]++;
      lastBox={a:null,b:null};
    }
    // blessures post-journée
    for(const ab of abs){
      const mins = minutesAlloc(ab);
      for(const id in mins){
        const p=S.players[id];
        if(mins[id]>8 && !p.inj && chance(injRiskPerGame(p,mins[id]))){
          rollInjury(p);
          const sub = roster(ab).filter(q=>!q.inj && q.pos===p.pos && q.id!==p.id).sort((x,y)=>effEpm(y)-effEpm(x))[0];
          p.inj.sub = sub? sub.n : 'rotation interne';
          if(ab===S.user) userInjury=p;
          else if(p.epm>=2) pushNews('woj', `<b>Woj :</b> ${p.n} (${ab}) out ${Math.ceil(p.inj.total)} matchs — ${p.inj.type}.`);
        }
      }
    }
    healDay(); healDay();
    cb.day++;
    if(userInjury) return {type:'injury', p:userInjury};
  }
  S.blockIdx++;
  endBlockHR();
  // pause tactique : activité de la ligue
  aiAiTrades(3);
  if(!S.deadlinePassed) generateProposals();
  if(S.blockIdx>=3 && !S.deadlinePassed){ S.deadlinePassed=true; pushNews('info','<b>Trade deadline passée.</b> Plus aucun transfert avant l\'intersaison.'); }
  return {type:'block_end', report:blockReport()};
}
function blockReport(){
  const st=S.standings[S.user], cb=S.curBlock;
  const rows = roster(S.user).filter(p=>p.season.gp>0).map(p=>{
    const a=avgStat(p.season);
    const real = impliedEpm(a);
    return {p, a, real, diff: Math.round((real-p.epm)*10)/10};
  }).sort((x,y)=>y.a.ppg-x.a.ppg);
  const sm = strategyMod(S.user, S.strategies.off, S.strategies.def);
  const best = aiStrategyForUser();
  return {w:st.w-cb.startW, l:st.l-cb.startL, totW:st.w, totL:st.l, rows, sm, best};
}
function impliedEpm(a){
  const v = (a.ppg*0.12 + a.rpg*0.13 + a.apg*0.17 + a.spg*0.8 + a.bpg*0.5 - a.topg*0.35) * (0.55+0.45*clamp(a.mpg/34,0,1)) - 2.6;
  return Math.round(clamp(v,-4,8)*10)/10;
}
function aiStrategyForUser(){
  let best={off:null,def:null,v:-99};
  for(const o of OFF_STRATS) for(const d of DEF_STRATS){
    const m=strategyMod(S.user,o,d);
    if(m.total>best.v) best={off:o,def:d,v:m.total};
  }
  return best;
}

// ============ RH : fatigue, promesses, dialogue, prolongations ============
function endBlockHR(){
  for(const ab of Object.keys(DATA.teams)){
    for(const p of roster(ab)){
      const gp = p.season.gp;
      const mpg = gp>0 ? p.season.min/gp : 0;
      // Fatigue cumulative : la surcharge s'additionne bloc après bloc, le repos régénère
      let df = 0;
      if(mpg>34) df += (mpg-34)*0.05;
      if(p.age>=33 && mpg>31) df += 0.06;
      if(mpg<30) df -= 0.12;
      p.fatigue = clamp(Math.round((p.fatigue+df)*100)/100, 0, 1.4);
      // Promesse de temps de jeu : tenue ou trahie
      if(p.tm===S.user && p.promise && S.blockIdx>=p.promise.due){
        if(mpg >= p.promise.mpg-2){ p.morale=clamp(p.morale+5,5,99); }
        else { p.morale=clamp(p.morale-12,5,99);
          pushNews('info', `<b>Vestiaire :</b> ${p.n} estime que ta promesse de temps de jeu n'a pas été tenue.`); }
        p.promise=null;
      }
    }
  }
  const lm = lockerMorale(S.user);
  if(lm<45) pushNews('info', `<b>⚠️ Vestiaire en crise (${Math.round(lm)}/100) :</b> l'ambiance plombe les performances (malus de force actif).`);
  else if(lm>78) pushNews('info', `<b>Vestiaire :</b> excellente alchimie (${Math.round(lm)}/100) — l'équipe joue au-dessus de sa valeur.`);
}

// ---- Dialogue joueur (1 prise de parole par joueur et par bloc) ----
function talkKey(){ return S.yr+'-'+S.phase+'-'+(S.blockIdx||0); }
function canTalk(p){ return p._talk !== talkKey(); }
function talkPlayer(id, kind){
  const p = S.players[id];
  if(!canTalk(p)) return {ok:false, msg:`Tu as déjà parlé à ${p.n.split(' ')[0]} récemment. Attends le prochain bloc.`};
  p._talk = talkKey();
  const a = p.season.gp>0 ? avgStat(p.season) : null;
  const under = a ? impliedEpm(a) < p.epm-0.6 : false;
  let d=0, msg='';
  if(kind==='encourager'){
    if(p.morale<=75){ d=4+Math.round(rnd()*3); msg=`${p.n} apprécie ton soutien.`; }
    else if(chance(0.25)){ d=-3; msg=`${p.n} : « Pas besoin qu'on me materne. » Trop de pression.`; }
    else { d=2; msg=`${p.n} hoche la tête, déjà concentré.`; }
  } else if(kind==='recadrer'){
    if(p.morale<35){ d=-8; msg=`${p.n} le prend très mal — le vestiaire en parle.`; }
    else if(under && chance(0.55)){ d=6; msg=`${p.n} accuse le coup… puis répond : « Tu as raison. » Électrochoc.`; }
    else if(chance(0.5)){ d=5; msg=`${p.n} accepte la critique et promet de réagir.`; }
    else { d=-6; msg=`${p.n} se braque : « Regarde mes minutes avant de me juger. »`; }
  } else if(kind==='promettre'){
    const mins = minutesAlloc(S.user)[p.id]||0;
    p.promise = {mpg: Math.round(mins+4), due: (S.blockIdx||0)+1};
    d=8; msg=`${p.n} : « Chiche. » Il attend ~${p.promise.mpg} min/match dès maintenant — tiens parole.`;
  }
  p.morale = clamp(p.morale+d, 5, 99);
  return {ok:true, msg, d};
}

// ---- Prolongation de contrat ----
function extAsk(p){
  let ask = mktValue({epm:p.epm, age:p.age, aav:p.sal});
  ask *= 1 + clamp((62-p.morale)*0.004, -0.06, 0.18);     // un joueur heureux fait un effort
  const st=S.standings[S.user], tot=st.w+st.l;
  if(tot>10 && st.w/tot>0.6) ask *= 0.95;                  // équipe qui gagne : rabais
  ask = clamp(Math.round(ask/100000)*100000, CBA.minSal, 62000000);
  const yrs = p.age<=26?4 : p.age<=30?3 : p.age<=33?2 : 1;
  return {sal: ask, yrs};
}
function offerExtension(id, sal, yrs){
  const p = S.players[id];
  if(p.tm!==S.user) return {ok:false, msg:'Ce joueur n\'est pas dans ton effectif.'};
  if(p.yrs>2) return {ok:false, msg:`${p.n} a encore ${p.yrs} ans de contrat — trop tôt pour prolonger.`};
  if(p.ext) return {ok:false, msg:`${p.n} a déjà signé sa prolongation.`};
  if(p.negoLock) return {ok:false, msg:`${p.n} a gelé les négociations pour cette saison après tes offres au rabais.`};
  const ask = extAsk(p);
  const score = sal/ask.sal;
  const yrsFit = yrs>=ask.yrs ? 0.05 : yrs===ask.yrs-1 ? 0 : -0.07;
  const bonus = (p.morale>70?0.06:0) + (p.age>=34?0.08:0) + yrsFit;
  const pAcc = clamp((score-0.78)*3.4 + bonus, 0.02, 0.96);
  p.negoCount = (p.negoCount||0)+1;
  if(chance(pAcc)){
    p.ext = {sal: Math.round(sal), yrs};
    p.morale = clamp(p.morale+10, 5, 99);
    pushNews(p.epm>=2.5?'woj':'fa', `${p.epm>=2.5?'<b>Woj Bomb :</b> ':''}${p.n} prolonge chez toi — ${yrs} ans, ${fmtM(sal)}/an (effectif à l'expiration du contrat actuel).`);
    return {ok:true, msg:`${p.n} signe : ${yrs} ans à ${fmtM(sal)}/an. Le vestiaire salue le geste.`};
  }
  let msg;
  if(score<0.85){ p.morale=clamp(p.morale-4,5,99); msg=`${p.n} est vexé par cette offre au rabais.`; }
  else msg=`${p.n} décline poliment.`;
  if(p.negoCount>=3){ p.negoLock=true; p.morale=clamp(p.morale-6,5,99);
    msg+=` Son agent gèle les négociations jusqu'à l'intersaison prochaine.`; }
  else {
    const counter = Math.round(Math.max(ask.sal*0.97, sal*1.12)/100000)*100000;
    msg+=` Contre-proposition de son agent : ${fmtM(counter)}/an sur ${ask.yrs} ans.`;
  }
  return {ok:false, msg};
}

// ---- Appeler un GM : « que veux-tu contre X ? » ----
function gmAskingPrice(targetId){
  const t = S.players[targetId];
  const ab = t.tm;
  if(isCornerstone(t)) return {locked:true, quote:`Le GM de ${ab} : « ${t.n.split(' ').slice(-1)[0]} est notre pierre angulaire. Intouchable, sauf s'il demande lui-même à partir. »`};
  const greed = 1.0 + (hash(ab)%8)/100;
  const myAssets = roster(S.user).filter(p=>!isCornerstone(p) && !p.inj).sort((a,b)=>tradeValue(b)-tradeValue(a));
  const myPicks = tradableFirsts(S.user);
  const packs=[];
  const tryPack = (players, nPicks)=>{
    if(packs.length>=3) return;
    const picks = myPicks.slice(0, nPicks);
    if(nPicks>0 && picks.length<nPicks) return;
    if(!stepienOk(S.user, picks.map(x=>x.yr)).ok) return;
    if(validateTrade(S.user, ab, players, [t], picks, []).length) return;
    const acc = aiAccepts(ab, players.map(x=>x), [t], picks, []);
    if(acc.ok) packs.push({players:[...players], picks:[...picks]});
  };
  for(const a of myAssets.slice(0,8)){ tryPack([a],0); tryPack([a],1); tryPack([a],2); }
  for(let i=0;i<Math.min(myAssets.length,6);i++) for(let j=i+1;j<Math.min(myAssets.length,7);j++){
    tryPack([myAssets[i],myAssets[j]],0); tryPack([myAssets[i],myAssets[j]],1);
  }
  const obj = aiObjective(ab);
  const tone = obj==='contend' ? 'On vise le titre : il nous faut un retour qui aide tout de suite.'
    : obj==='rebuild' ? 'On reconstruit : les jeunes et les picks nous intéressent davantage.'
    : 'On écoute, mais pas de cadeau.';
  return {locked:false, packs: packs.slice(0,3), quote:`Le GM de ${ab} : « ${tone} »`, t};
}
function gmProposePack(targetId, packIdx){
  const r = gmAskingPrice(targetId);
  if(r.locked || !r.packs[packIdx]) return {ok:false, msg:'Ce package n\'est plus disponible.'};
  const t = S.players[targetId], pk = r.packs[packIdx];
  const errs = validateTrade(S.user, t.tm, pk.players, [t], pk.picks, []);
  if(errs.length) return {ok:false, msg:errs[0]};
  executeTrade(S.user, t.tm, pk.players, [t], pk.picks, []);
  return {ok:true, msg:`Deal conclu : ${t.n} rejoint ton effectif.`};
}

// ============ Morale & demandes de transfert ============
function updateMorale(){
  for(const ab of Object.keys(DATA.teams)){
    const st=S.standings[ab], tot=st.w+st.l;
    for(const p of roster(ab)){
      let d = 0;
      if(tot>10) d += (st.w/tot - 0.5)*8;
      if(p.inj) d -= 2;
      const mins = minutesAlloc(ab)[p.id]||0;
      if(p.epm>=2 && mins<24) d -= 6;
      p.morale = clamp(Math.round(p.morale + d + (rnd()-0.5)*4), 5, 99);
      if(p.epm>3.0 && p.morale<30 && !p.tradeReq){
        p.tradeReq=true;
        pushNews('woj', `<b>Woj Bomb :</b> ${p.n} (${p.tm}) demande officiellement son transfert !`);
      }
    }
  }
}

// ============ Valorisation & moteur de trade ============
function tradeValue(p){
  let v = Math.pow(effEpm(p)+3.6, 1.6)*10;
  const af = p.age<=23?1.28: p.age<=26?1.12: p.age<=29?1.0: p.age<=32?0.84:0.68;
  v *= af;
  v += potential(p)*7;
  if(p.sal>30000000 && p.epm<2) v*=0.82;
  if(p.tradeReq) v*=0.8;
  if(p.inj) v*=0.88;
  return v;
}
const PICK_VALUE = {r1:34, r2:8};
// Objectif d'une franchise, dérivé de sa force (les fichiers ne contiennent pas d'objectif explicite)
function aiObjective(ab){
  const f = teamForce(ab);
  const st = S.standings[ab];
  const played = st.w+st.l;
  const winPct = played>0 ? st.w/played : null;
  const score = winPct!==null ? winPct*4-2 : f; // en cours de saison : bilan ; sinon : force
  if(score >= 1.4) return 'contend';   // vise le titre : prêt à lâcher des picks pour gagner maintenant
  if(score <= 0.2) return 'rebuild';   // reconstruit : échange ses vétérans contre jeunesse + picks
  return 'retool';                      // ajuste à la marge
}
// Une pierre angulaire ne bouge JAMAIS sans avoir demandé son transfert
function isCornerstone(p){
  if(p.tm==='FA'||p.tradeReq) return false;
  // Star avérée (niveau All-Star/All-NBA) : intouchable partout
  if(p.epm>=2.6) return true;
  const rs = roster(p.tm);
  const byVal = [...rs].sort((a,b)=>tradeValue(b)-tradeValue(a));
  // Le meilleur élément d'une franchise, s'il a un vrai impact, est protégé
  if(byVal[0] && byVal[0].id===p.id && p.epm>=1.6) return true;
  // Jeune pépite à très haut potentiel : bâtisseur d'avenir intouchable
  if(p.age<=23 && potential(p)>=3 && p.epm>=0.5 && byVal.slice(0,3).some(x=>x.id===p.id)) return true;
  return false;
}
function salaryLegal(ab, outSal, inSal){
  const pay = payroll(ab);
  const after = pay - outSal + inSal;
  if(after <= CBA.cap) return {ok:true, why:'absorbé sous le cap'};
  if(pay >= CBA.apron2){
    return inSal<=outSal ? {ok:true, why:'Second Apron : entrant ≤ sortant'} :
      {ok:false, why:`Second Apron : interdit de reprendre plus que ce qui sort (${fmtM(inSal)} > ${fmtM(outSal)})`};
  }
  const max = outSal*1.25+250000;
  return inSal<=max ? {ok:true, why:'matching 125% + 250k'} :
    {ok:false, why:`Matching salarial dépassé : ${fmtM(inSal)} > ${fmtM(max)} (125% + 250k)`};
}
function pickYears(){ const a=[]; for(let y=S.yr+1;y<=S.yr+6;y++) a.push(y); return a; }
function ownedFirsts(ab){
  const o={}; for(const y of pickYears()) o[y] = S.picks[ab][y] && S.picks[ab][y].r1===ab; return o;
}
function stepienOk(ab, yearsTraded){
  const o = ownedFirsts(ab);
  for(const y of yearsTraded) o[y]=false;
  for(let y=S.yr+1;y<S.yr+6;y++) if(!o[y] && !o[y+1]) return {ok:false, why:`Règle de Stepien : ${ab} serait sans 1er tour deux années consécutives (${y}/${y+1})`};
  return {ok:true};
}
function validateTrade(tA, tB, outA, outB, picksA, picksB){
  // outA: joueurs quittant tA ; picksA: 1ers tours que tA envoie [{yr}]
  const errs=[];
  const salA = outA.reduce((s,p)=>s+p.sal,0), salB = outB.reduce((s,p)=>s+p.sal,0);
  if(!outA.length && !picksA.length) errs.push('Aucun actif envoyé par '+tA);
  if(!outB.length && !picksB.length) errs.push('Aucun actif envoyé par '+tB);
  const lA = salaryLegal(tA, salA, salB); if(!lA.ok) errs.push(tA+' : '+lA.why);
  const lB = salaryLegal(tB, salB, salA); if(!lB.ok) errs.push(tB+' : '+lB.why);
  const stA = stepienOk(tA, picksA.map(x=>x.yr)); if(!stA.ok) errs.push(stA.why);
  const stB = stepienOk(tB, picksB.map(x=>x.yr)); if(!stB.ok) errs.push(stB.why);
  if(roster(tA).length - outA.length + outB.length > CBA.rosterMax) errs.push(tA+' : effectif > 15');
  if(roster(tB).length - outB.length + outA.length > CBA.rosterMax) errs.push(tB+' : effectif > 15');
  if(S.deadlinePassed) errs.push('Trade deadline passée');
  return errs;
}
// Valeur d'un 1er tour pour une équipe selon son objectif
function pickWorthFor(ab){
  const obj = aiObjective(ab);
  return obj==='rebuild'? PICK_VALUE.r1*1.45 : obj==='contend'? PICK_VALUE.r1*0.7 : PICK_VALUE.r1;
}
// 1ers tours qu'une équipe possède et peut légalement échanger (hors picks déjà engagés dans le trade)
function tradableFirsts(ab, exclude){
  const ex = new Set((exclude||[]).map(x=>x.yr));
  const out=[];
  for(const y of pickYears()){
    if(S.picks[ab][y] && S.picks[ab][y].r1===ab && !ex.has(y)){
      if(stepienOk(ab, [...(exclude||[]).map(x=>x.yr), y]).ok) out.push({yr:y});
    }
  }
  return out;
}
function aiAccepts(aiTeam, getting, giving, picksIn, picksOut){
  for(const p of giving) if(isCornerstone(p)) return {ok:false, why:p.n+' est la pierre angulaire de '+aiTeam+' : intouchable sans demande de transfert'};
  const pw = pickWorthFor(aiTeam);
  const vIn = getting.reduce((s,p)=>s+tradeValue(p),0) + picksIn.length*pw;
  const vOut = giving.reduce((s,p)=>s+tradeValue(p),0) + picksOut.length*pw;
  let greed = 1.0 + (hash(aiTeam)%8)/100;
  if(giving.some(p=>p.tradeReq && p.epm>=2.0)) greed *= 0.82; // vendeur motivé : star mécontente
  if(vIn >= vOut*greed) return {ok:true, vIn, vOut};
  return {ok:false, why:`Offre insuffisante pour ${aiTeam} (valeur reçue ${Math.round(vIn)} < attendue ${Math.round(vOut*greed)})`, vIn, vOut, need:vOut*greed};
}

function purgeUserMins(){

function executeTrade(tA, tB, outA, outB, picksA, picksB, silent){
  for(const p of outA){ p.tm=tB; p.tradeReq=false; p.morale=clamp(p.morale+8,5,99); }
  for(const p of outB){ p.tm=tA; p.tradeReq=false; p.morale=clamp(p.morale+8,5,99); }
  for(const x of picksA) S.picks[tA][x.yr].r1=tB;
  for(const x of picksB) S.picks[tB][x.yr].r1=tA;
  invalidateStrat(tA); invalidateStrat(tB);
  const fmt = (ps,pk)=> ps.map(p=>p.n).concat(pk.map(x=>'1er tour '+x.yr)).join(', ')||'—';
  const big = Math.max(0,...outA.concat(outB).map(p=>p.epm));
  const msg = `<b>${tA} ⇄ ${tB}</b> — ${tA} envoie ${fmt(outA,picksA)} contre ${fmt(outB,picksB)}.`;
  if(!silent) pushNews(big>=2.5?'woj':'trade', (big>=2.5?'<b>Woj Bomb :</b> ':'')+msg);
  S.histo.push({t:'trade', msg});
  purgeUserMins();
}
// Trades IA↔IA réalistes : pierres angulaires protégées, picks inclus selon les objectifs
function tryBalancedTrade(tA, tB){
  // tA reçoit le meilleur joueur ; il compense avec joueur(s) + picks. Respecte le CBA et l'acceptation des deux camps.
  const poolA = roster(tA).filter(p=>!isCornerstone(p) && !p.inj);
  const poolB = roster(tB).filter(p=>!isCornerstone(p) && !p.inj && (p.tradeReq || (p.epm>=-1.2 && p.epm<=3.5)));
  if(!poolB.length) return false;
  // cible : un joueur de tB qui intéresse tA (un cran au-dessus de ce que tA a en surplus)
  const target = pick(poolB.filter(p=>p.epm>=0.4) ) || pick(poolB);
  if(!target) return false;
  // tA construit une contrepartie : 1 joueur de valeur proche + éventuellement filler + picks
  const baseOuts = poolA.filter(p=>Math.abs(p.sal-target.sal) <= Math.max(p.sal,target.sal)*0.4+3000000)
    .sort((a,b)=>Math.abs(tradeValue(b)-tradeValue(target))-Math.abs(tradeValue(a)-tradeValue(target)));
  const mainOut = baseOuts.pop(); if(!mainOut) return false;
  let outA=[mainOut], outB=[target], picksA=[], picksB=[];
  // équilibrage par picks : le camp qui reçoit le plus de valeur ajoute un 1er tour
  const gap = ()=> (tradeValue(target)+picksB.length*PICK_VALUE.r1) - (outA.reduce((s,p)=>s+tradeValue(p),0)+picksA.length*PICK_VALUE.r1);
  let guard=0;
  while(gap() > 12 && guard++<3){ // tA reçoit trop : tA ajoute un pick (typiquement un contender qui paie pour gagner)
    const f = tradableFirsts(tA, picksA)[0]; if(!f) break; picksA.push(f);
  }
  guard=0;
  while(gap() < -12 && guard++<3){ // tB reçoit trop : tB ajoute un pick (un rebuild lâche un vét + pick contre jeunesse)
    const f = tradableFirsts(tB, picksB)[0]; if(!f) break; picksB.push(f);
  }
  // matching salarial : ajouter un filler si besoin
  guard=0;
  while(salaryLegal(tA, outA.reduce((s,p)=>s+p.sal,0), outB.reduce((s,p)=>s+p.sal,0)).ok===false && guard++<3){
    const filler = poolA.filter(p=>!outA.includes(p)).sort((a,b)=>a.sal-b.sal)[0]; if(!filler) break; outA.push(filler);
  }
  if(validateTrade(tA,tB,outA,outB,picksA,picksB).length) return false;
  const accA = aiAccepts(tA, outB, outA, picksB, picksA);
  const accB = aiAccepts(tB, outA, outB, picksA, picksB);
  if(!accA.ok || !accB.ok) return false;
  executeTrade(tA,tB,outA,outB,picksA,picksB);
  return true;
}
// Résolution des demandes de transfert : une star mécontente finit par être échangée,
// même à prix cassé (vente forcée), via un package agrégé joueurs + picks.
function resolveTradeRequests(){
  let moved=0;
  const reqs = Object.values(S.players).filter(p=>p.tradeReq && p.tm!=='FA' && p.tm!==S.user && !p.inj);
  for(const star of reqs){
    if(!chance(0.55)) continue; // la saga peut durer un cycle de plus
    const from = star.tm;
    const dests = Object.keys(DATA.teams).filter(a=>a!==from && a!==S.user)
      .sort((a,b)=>(aiObjective(b)==='contend'?1:0)-(aiObjective(a)==='contend'?1:0));
    let best=null;
    for(const ab of dests){
      // package : joueurs non-pierre angulaire par valeur décroissante jusqu'au matching salarial (max 3)
      const pool = roster(ab).filter(q=>!isCornerstone(q) && !q.inj).sort((a,b)=>tradeValue(b)-tradeValue(a));
      const out=[]; let sal=0;
      for(const q of pool){
        if(out.length>=3) break;
        out.push(q); sal+=q.sal;
        if(salaryLegal(from, star.sal, sal).ok && salaryLegal(ab, sal, star.sal).ok) break;
      }
      if(!salaryLegal(from, star.sal, sal).ok || !salaryLegal(ab, sal, star.sal).ok) continue;
      const picksB = tradableFirsts(ab).slice(0,2);
      if(validateTrade(from, ab, [star], out, [], picksB).length) continue;
      const vIn = out.reduce((s,q)=>s+tradeValue(q),0) + picksB.length*pickWorthFor(from);
      if(!best || vIn>best.vIn) best={ab, out, picksB, vIn};
    }
    if(!best) continue;
    // vente forcée : le vendeur accepte dès ~60% de la valeur (déjà décotée par tradeReq)
    if(best.vIn < tradeValue(star)*0.6) continue;
    executeTrade(from, best.ab, [star], best.out, [], best.picksB);
    pushNews('woj', `<b>Woj Bomb :</b> la saga ${star.n} est terminée — direction ${best.ab} !`);
    moved++;
  }
  return moved;
}
function aiAiTrades(n){
  const abs = Object.keys(DATA.teams).filter(a=>a!==S.user);
  let done=0, tries=0;
  done += resolveTradeRequests();
  while(done<n && tries<200){
    tries++;
    // 40% du temps : on apparie un contender et une équipe en reconstruction (échange vét/picks)
    let tA, tB;
    if(rnd()<0.4){
      const contenders = abs.filter(a=>aiObjective(a)==='contend');
      const rebuilders = abs.filter(a=>aiObjective(a)==='rebuild');
      if(contenders.length && rebuilders.length){ tA=pick(contenders); tB=pick(rebuilders); }
    }
    if(!tA){ tA=pick(abs); tB=pick(abs.filter(x=>x!==tA)); }
    if(tryBalancedTrade(tA,tB)){ done++; continue; }
    // sinon, simple swap de role players de valeur proche
    const pool = ab => roster(ab).filter(p=>!isCornerstone(p) && (p.tradeReq || (p.epm>=-1.2 && p.epm<=2.4)) && !p.inj);
    const a=pick(pool(tA)||[]), b=pick(pool(tB)||[]);
    if(!a||!b||a===b) continue;
    if(Math.abs(a.sal-b.sal) > Math.max(a.sal,b.sal)*0.32+2500000) continue;
    if(Math.abs(tradeValue(a)-tradeValue(b)) > 13) continue;
    if(validateTrade(tA,tB,[a],[b],[],[]).length) continue;
    executeTrade(tA,tB,[a],[b],[],[]);
    done++;
  }
  return done;
}
// Limites d'effectif : coupe à 15 (les moins bons partent en FA), complète à 12 au minimum
function enforceRosterLimits(){
  for(const ab of Object.keys(DATA.teams)){
    let rs = roster(ab);
    while(rs.length > CBA.rosterMax){
      const cut = rs.filter(p=>!isCornerstone(p)).sort((a,b)=>effEpm(a)-effEpm(b))[0] || rs[rs.length-1];
      cut.tm='FA'; cut.sal=0; cut.ct='Coupé '+S.yr;
      if(!S.fa.includes(cut.id)) S.fa.push(cut.id);
      if(cut.epm>=1.5) pushNews('fa', `<b>${cut.n}</b> coupé par ${ab}, disponible sur le marché.`);
      rs = roster(ab);
    }
    while(rs.length < CBA.rosterMin){
      const f=S.fa.map(id=>S.players[id]).filter(x=>x.tm==='FA').sort((a,b)=>b.epm-a.epm)[0];
      if(!f) break;
      f.tm=ab; f.sal=CBA.minSal; f.ct=`FA ${S.yr} (1 an, min)`;
      rs = roster(ab);
    }
  }
}

// Propositions IA → utilisateur
function generateProposals(){
  if(S.deadlinePassed) return;
  S.proposals = S.proposals.filter(pr=>!pr.resolved);
  if(S.proposals.length>=2) return;
  const abs = Object.keys(DATA.teams).filter(a=>a!==S.user);
  for(let t=0;t<50 && S.proposals.length<2;t++){
    const ai=pick(abs);
    const obj=aiObjective(ai);
    const want = roster(S.user).filter(p=>!p.inj && p.epm>=-0.5 && p.epm<=2.8 && !isCornerstone(p));
    const give = roster(ai).filter(p=>!isCornerstone(p) && !p.inj);
    if(!want.length||!give.length) continue;
    const target=pick(want);
    let getIds=[], picksGet=[], picksGive=[];
    if(obj==='rebuild' && target.age<=25 && target.epm>=0.5){
      // l'équipe en reconstruction cède un bon vétéran et réclame jeunesse + un pick
      const vet = give.filter(p=>p.age>=27 && p.epm>=1 && Math.abs(p.sal-target.sal)<target.sal*0.45+5000000)
        .sort((a,b)=>tradeValue(b)-tradeValue(a))[0];
      if(!vet) continue;
      getIds=[vet.id];
      const uf = tradableFirsts(S.user);
      if(uf.length && tradeValue(vet) > tradeValue(target)+10) picksGive=[uf[0]]; // l'IA réclame un pick
    } else {
      // offre classique : un joueur de valeur proche, + un pick si l'IA convoite vraiment la cible
      const offer = give.filter(p=>Math.abs(p.sal-target.sal)<target.sal*0.3+3000000 && tradeValue(p)>=tradeValue(target)*0.85 && tradeValue(p)<=tradeValue(target)*1.25);
      if(!offer.length) continue;
      const o=offer.sort((x,y)=>tradeValue(y)-tradeValue(x))[0];
      getIds=[o.id];
      if(obj==='contend' && tradeValue(o) < tradeValue(target)){
        const f = tradableFirsts(ai)[0]; if(f) picksGet=[f]; // un contender ajoute un pick pour convaincre
      }
    }
    const get=getIds.map(i=>S.players[i]);
    if(validateTrade(ai,S.user,get,[target],picksGet,picksGive).length) continue;
    S.proposals.push({id:Date.now()+t, from:ai, get:getIds, give:[target.id], picksGet, picksGive, resolved:false,
      note:`${ai} (${obj==='contend'?'vise le titre':obj==='rebuild'?'reconstruit':'ajuste son effectif'}) cherche un ${target.pos}.`});
  }
}
function negotiateProposal(pr){
  // l'IA peut bonifier une fois : soit un 2e joueur min, soit retirer le pick qu'elle réclamait
  const ai=pr.from;
  if(pr.picksGive && pr.picksGive.length && chance(0.5)){ pr.picksGive=[]; pr.improved=true; return {ok:true, msg:`${ai} retire le tour de draft qu'elle réclamait.`}; }
  const extra = roster(ai).filter(p=>p.sal<6000000 && p.epm<1 && !pr.get.includes(p.id))[0];
  if(extra && chance(0.55)){ pr.get.push(extra.id); pr.improved=true; return {ok:true, msg:`${ai} ajoute ${extra.n} à son offre.`}; }
  return {ok:false, msg:`${ai} refuse d'améliorer son offre.`};
}
// Recommandations de packages pour un joueur de l'utilisateur
function recommendPackages(p){
  const out=[], abs=Object.keys(DATA.teams).filter(a=>a!==S.user);
  const star = p.epm>=3.0;
  for(const ab of abs){
    const rs = roster(ab).filter(q=>!isCornerstone(q) && !q.inj);
    // combos 1 ou 2 joueurs
    const combos=[];
    for(let i=0;i<rs.length;i++){
      combos.push([rs[i]]);
      for(let j=i+1;j<rs.length;j++) combos.push([rs[i],rs[j]]);
    }
    for(const c of combos){
      // sweetener : pour une star, l'IA joint un 1er tour si elle peut encore se le permettre
      let picksB = [];
      if(star){
        for(const yr of pickYears().slice(0,3)){
          if(S.picks[ab][yr] && S.picks[ab][yr].r1===ab && stepienOk(ab,[yr]).ok){ picksB=[{yr}]; break; }
        }
      }
      let acc = aiAccepts(ab, [p], c, [], picksB);
      if(!acc.ok && picksB.length){ picksB=[]; acc = aiAccepts(ab, [p], c, [], []); }
      if(!acc.ok) continue;
      if(validateTrade(S.user, ab, [p], c, [], picksB).length) continue;
      const gain = c.reduce((s,q)=>s+tradeValue(q),0) + picksB.length*PICK_VALUE.r1 - tradeValue(p);
      out.push({ab, players:c, picks:picksB, gain});
    }
  }
  out.sort((x,y)=>y.gain-x.gain);
  // diversité d'équipes
  const seen=new Set(), res=[];
  for(const o of out){ if(seen.has(o.ab)) continue; seen.add(o.ab); res.push(o); if(res.length>=4) break; }
  const a = p.season.gp>3 ? avgStat(p.season) : null;
  const sellLow = p.inj || p.morale<35 || (a && a.ppg < p.c.pts*0.75 && p.c.pts>8);
  return {packs:res, sellLow};
}

// Ordre de draft : loterie pondérée (4 premiers choix) puis bilan inverse ; propriété des picks respectée
function buildDraftOrder(yr){
  const abs = Object.keys(DATA.teams);
  const byRec = [...abs].sort((a,b)=>(S.standings[a].w-S.standings[b].w) || (rnd()-0.5));
  const lotto = byRec.slice(0,14);
  const weights = [140,140,140,125,105,90,75,60,45,30,20,15,10,5];
  const winners=[]; const pool = lotto.map((t,i)=>({t,w:weights[i]}));
  for(let k=0;k<4;k++){
    const tot = pool.reduce((s,x)=>s+x.w,0);
    let r = rnd()*tot;
    for(let i=0;i<pool.length;i++){ r-=pool[i].w; if(r<=0){ winners.push(pool[i].t); pool.splice(i,1); break; } }
  }
  const r1order = winners.concat(lotto.filter(t=>!winners.includes(t))).concat(byRec.slice(14));
  const order=[];
  r1order.forEach((orig,i)=>{
    const owner = (S.picks[orig][yr]&&S.picks[orig][yr].r1)||orig;
    order.push({pick:i+1, tm:owner, via: owner!==orig? DATA.teams[orig].name : null});
  });
  byRec.forEach((orig,i)=>{
    const owner = (S.picks[orig][yr]&&S.picks[orig][yr].r2)||orig;
    order.push({pick:31+i, tm:owner, via: owner!==orig? DATA.teams[orig].name : null});
  });
  return order;
}

function mktValue(f){
  let v = (f.epm+3.2)*4800000;
  if(f.age>=33) v*=0.8; if(f.age>=36) v*=0.65;
  if(f.aav) v = v*0.55 + f.aav*0.45;
  return clamp(Math.round(v/100000)*100000, CBA.minSal, 62000000);
}
function teamNeeds(ab){
  const have = {PG:0,SG:0,SF:0,PF:0,C:0};
  for(const p of roster(ab)) have[p.pos]=(have[p.pos]||0)+1;
  return Object.keys(have).filter(k=>have[k]<2);
}
function aiFaWave(){
  S.faWave++;
  const abs = shuffle(Object.keys(DATA.teams).filter(a=>a!==S.user));
  const signed=[];
  for(const ab of abs){
    let slots = CBA.rosterMax-2 - roster(ab).length;
    if(S.faWave>=3) slots = Math.max(slots, CBA.rosterMin - roster(ab).length);
    if(slots<=0) continue;
    const needs = teamNeeds(ab);
    const room = capRoom(ab);
    const cands = S.fa.map(id=>S.players[id]).filter(f=>f.tm==='FA')
      .sort((x,y)=> (needs.includes(y.pos)?1:0)-(needs.includes(x.pos)?1:0) || y.epm-x.epm);
    let take = S.faWave===1? Math.min(slots,1+(rnd()<0.5?1:0)) : slots;
    for(const f of cands){
      if(take<=0) break;
      const val = mktValue(f);
      let sal;
      if(room >= val) sal = val;
      else if(val <= CBA.mle && payroll(ab) < CBA.apron1) sal = val;
      else if(f.epm < 0.5) sal = CBA.minSal;
      else continue;
      if(S.faWave===1 && f.epm>2.5 && !chance(0.5)) continue;
      const yz = 1+Math.floor(rnd()*3);
      f.tm=ab; f.sal=sal; f.yrs=yz; f.ct=`FA ${S.yr} (${yz} ans)`;
      signed.push({f,ab,sal}); take--; invalidateStrat(ab);
      if(f.epm>=2.5) pushNews('woj', `<b>Woj Bomb :</b> ${f.n} signe à ${ab} pour ${fmtM(sal)}/an !`);
    }
  }
  if(signed.length) pushNews('fa', `<b>Free Agency — vague ${S.faWave} :</b> ${signed.length} signatures dans la ligue.`);
  return signed;
}
function userOfferLegality(salary){
  const room = capRoom(S.user), pay=payroll(S.user);
  if(salary<=room) return {ok:true, mode:'Cap Room'};
  if(salary<=CBA.mle && pay<CBA.apron1) return {ok:true, mode:'Mid-Level Exception'};
  if(salary<=CBA.minSal) return {ok:true, mode:'Contrat minimum'};
  return {ok:false, why: pay>=CBA.apron1? 'Au-dessus du First Apron : seul le minimum est disponible' : `Au-delà du cap room (${fmtM(Math.max(room,0))}) et de la MLE (${fmtM(CBA.mle)})`};
}
function offerFA(f, years, salary){
  const leg = userOfferLegality(salary);
  if(!leg.ok) return {ok:false, msg:leg.why};
  if(roster(S.user).length>=CBA.rosterMax) return {ok:false, msg:'Effectif complet (15)'};
  const val = mktValue(f);
  const st=S.standings[S.user];
  const winBonus = (st.w+st.l)>0? (st.w/(st.w+st.l)-0.5)*0.2 : (teamForce(S.user)>1.2?0.08:0);
  const pAcc = clamp(salary/val - 0.92 + winBonus + (years>=2?0.04:0), 0.02, 0.97);
  if(chance(pAcc)){
    f.tm=S.user; f.sal=salary; f.yrs=years; f.ct=`FA ${S.yr} (${years} ans)`; invalidateStrat(S.user);
    pushNews(f.epm>=2.5?'woj':'fa', `${f.epm>=2.5?'<b>Woj Bomb :</b> ':''}${f.n} signe chez toi — ${years} ans, ${fmtM(salary)}/an.`);
    return {ok:true, msg:`${f.n} accepte ton offre (${leg.mode}).`};
  }
  f._refused = (f._refused||0)+1;
  return {ok:false, msg:`${f.n} décline ton offre — il vise ~${fmtM(val)}/an.`};
}

// ============ Draft 2026 ============
function posMap(pos){
  const m = {G:'PG','G/F':'SG','F':'SF','F/C':'PF','C/F':'C'};
  return ['PG','SG','SF','PF','C'].includes(pos)? pos : (m[pos]||'SF');
}
// Valeur de draft : production (BPM) × jeunesse. Les très hauts picks sont les plus jeunes
// à haut potentiel ; un senior productif de 23-26 ans glisse en fin de 1er tour / 2e tour.
function draftValue(x){ return x.bpm + (20.5 - x.age)*2.0; }
// Un rookie plus âgé est plus prêt immédiatement (EPM an 1 supérieur)… mais son plafond est plus bas.
function rookieEpm(bpm, age){
  const ready = age ? clamp((age-20)*0.2, -0.4, 0.8) : 0;
  return clamp(Math.round((((bpm-7)*0.18 - 0.8) + ready)*10)/10, -2.6, 1.6);
}
function prospectToPlayer(pr, pickNo, tm){
  const epm = rookieEpm(pr.bpm, pr.age);
  const isBig = posMap(pr.pos)==='C'||posMap(pr.pos)==='PF';
  const de = Math.round((epm*(isBig?0.55:0.42) + (pr.bpg>1.5?0.2:0))*10)/10;
  const oe = Math.round((epm-de)*10)/10;
  const pl = {id:pr.id, n:pr.n, tm, pos:posMap(pr.pos), age:Math.round(pr.age), sal:ROOKIE_SCALE(pickNo),
    ct:`Rookie (pick ${pickNo})`, yrs:4, epm, oe, de, est:1, rookie:true,
    c:{gp:20, pts:pr.ppg*0.62, reb:pr.rpg*0.78, ast:pr.apg*0.7, stl:pr.spg*0.75, blk:pr.bpg*0.7,
       tov:pr.topg*0.85, fg:clamp(pr.ts-0.06,0.4,0.62), fg3:posMap(pr.pos)==='C'?0.28:0.34, ft:clamp(pr.ts+0.18,0.6,0.88), min:26}};
  S.players[pl.id] = initPlayer(pl, tm);
  return S.players[pl.id];
}
function aiDraftPick(tm){
  const avail = S.prospects.filter(x=>!x.drafted);
  const needs = teamNeeds(tm);
  const scored = avail.map(x=>({x, s: draftValue(x) + (needs.includes(posMap(x.pos))?1.4:0) + rnd()*2.2}));
  scored.sort((a,b)=>b.s-a.s);
  return scored[0].x;
}
function doDraftPick(prospect){
  const slot = S.draftOrder[S.draftIdx];
  prospect.drafted = slot.tm;
  const pl = prospectToPlayer(prospect, slot.pick, slot.tm);
  S.drafted.push({pick:slot.pick, tm:slot.tm, n:prospect.n, id:prospect.id});
  if(slot.pick<=14 || slot.tm===S.user)
    pushNews('draft', `<b>Draft — pick ${slot.pick} :</b> ${slot.tm} sélectionne ${prospect.n} (${prospect.school}).`);
  S.draftIdx++;
  return pl;
}
function simDraftUntilUser(){
  while(S.draftIdx < S.draftOrder.length && S.draftOrder[S.draftIdx].tm!==S.user){
    doDraftPick(aiDraftPick(S.draftOrder[S.draftIdx].tm));
  }
  if(S.draftIdx>=S.draftOrder.length){ S.phase='FA'; pushNews('info',`<b>Draft ${S.yr} terminée.</b> Ouverture de la Free Agency.`); return null; }
  return S.draftOrder[S.draftIdx];
}

// ============ Playoffs ============
function seedConf(conf){
  return Object.keys(DATA.teams).filter(ab=>DATA.teams[ab].conf===conf)
    .sort((a,b)=> S.standings[b].w-S.standings[a].w || teamForce(b)-teamForce(a)).slice(0,8);
}
function newSeries(hi, lo, round){
  return {hi, lo, wh:0, wl:0, games:[], done:false, winner:null, round};
}
function startPlayoffs(){
  S.phase='PLAYOFFS';
  const E=seedConf('Est'), O=seedConf('Ouest');
  const mk = s => [newSeries(s[0],s[7],1), newSeries(s[3],s[4],1), newSeries(s[2],s[5],1), newSeries(s[1],s[6],1)];
  S.bracket = {E:{seeds:E, r1:mk(E), sf:[], cf:null}, O:{seeds:O, r1:mk(O), sf:[], cf:null}, finals:null};
  S.seriesPrep=null;
  pushNews('info', `<b>Playoffs ${S.yr+1} :</b> le bracket est connu. ${E[0]} et ${O[0]} têtes de série.`);
}
function userSeries(){
  for(const se of allSeries()) if(!se.done && (se.hi===S.user||se.lo===S.user)) return se;
  return null;
}
function allSeries(){
  const B=S.bracket; if(!B) return [];
  const out=[...B.E.r1,...B.O.r1,...B.E.sf,...B.O.sf];
  if(B.E.cf) out.push(B.E.cf); if(B.O.cf) out.push(B.O.cf);
  if(B.finals) out.push(B.finals);
  return out;
}
function matchupBonus(se){
  // assignations défensives de l'utilisateur sur les menaces adverses
  if(!S.seriesPrep || S.seriesPrep.series!==se) return {opp:0, notes:[]};
  const pr=S.seriesPrep; let opp=0; const notes=[];
  for(const a of pr.assign){
    const th=S.players[a.threat], df=S.players[a.def];
    if(!th||!df) continue;
    if((df.de||0) >= (th.oe||0)*0.45){ opp-=0.22; notes.push(`${df.n} limite ${th.n}`); }
    else { opp+=0.13; notes.push(`${th.n} domine son vis-à-vis ${df.n}`); }
  }
  return {opp, notes};
}
function simSeriesGame(se){
  const g = se.games.length+1;
  const homeHi = [1,2,5,7].includes(g);
  const userIn = se.hi===S.user||se.lo===S.user;
  const mb = userIn? matchupBonus(se) : {opp:0,notes:[]};
  const userIsHi = se.hi===S.user;
  const opts = {playoffs:true, box:userIn, neutral:false,
    bonusA: homeHi?0.32:0, bonusB: homeHi?0:0.32};
  if(userIn){ if(userIsHi) opts.bonusB+=mb.opp; else opts.bonusA+=mb.opp; }
  S._gameTick='po'+se.hi+se.lo+g; lastBox={a:null,b:null};
  const r = simGame(se.hi, se.lo, opts);
  if(r.win===se.hi) se.wh++; else se.wl++;
  se.games.push({g, sa:r.sa, sb:r.sb, win:r.win, boxA:r.boxA, boxB:r.boxB, notes:mb.notes});
  if(se.wh===4||se.wl===4){
    se.done=true; se.winner = se.wh===4? se.hi : se.lo;
    applySeriesFatigue(se);
    advanceBracket();
  }
  return r;
}
function applySeriesFatigue(se){
  for(const ab of [se.hi,se.lo]){
    for(const p of roster(ab)){
      const a=avgStat(p.playoffs);
      if(a.gp>=4 && a.mpg>40){ p.fatigue=Math.round((p.fatigue+0.25)*100)/100; }
    }
  }
}
function simSeriesToEnd(se){ while(!se.done) simSeriesGame(se); }
function advanceBracket(){
  const B=S.bracket;
  for(const c of ['E','O']){
    const conf=B[c];
    if(conf.r1.every(s=>s.done) && !conf.sf.length){
      conf.sf=[newSeries(conf.r1[0].winner, conf.r1[1].winner, 2), newSeries(conf.r1[2].winner, conf.r1[3].winner, 2)];
    }
    if(conf.sf.length===2 && conf.sf.every(s=>s.done) && !conf.cf){
      conf.cf=newSeries(conf.sf[0].winner, conf.sf[1].winner, 3);
    }
  }
  if(B.E.cf&&B.E.cf.done&&B.O.cf&&B.O.cf.done&&!B.finals){
    B.finals=newSeries(B.O.cf.winner, B.E.cf.winner, 4);
    pushNews('info', `<b>Finales NBA :</b> ${B.finals.hi} affronte ${B.finals.lo} !`);
  }
  if(B.finals&&B.finals.done&&!S.champion){
    S.champion=B.finals.winner;
    pushNews('woj', `<b>🏆 ${DATA.teams[S.champion].name} remporte le titre NBA ${S.yr+1} !</b>`);
    computeAwards();
    S.phase='AWARDS';
  }
}
function simAiSeries(){
  for(const se of allSeries()){
    if(!se.done && se.hi!==S.user && se.lo!==S.user){
      // ne simule un tour IA que si la série utilisateur de ce tour est finie ou inexistante
      simSeriesToEnd(se);
      return true;
    }
  }
  return false;
}
function userEliminated(){
  if(!S.bracket) return false;
  if(S.champion) return S.champion!==S.user;
  for(const se of allSeries()) if(se.done && se.winner!==S.user && (se.hi===S.user||se.lo===S.user)) return true;
  return false;
}

// ============ Récompenses ============
function computeAwards(){
  const all = Object.values(S.players).filter(p=>p.tm!=='FA' && p.season.gp>=40);
  const wsOf = p => { const st=S.standings[p.tm]; const rs=roster(p.tm);
    const tot = rs.reduce((s,q)=>s+(q.epm+3.5)*Math.max(q.season.min,1),0);
    return st.w * ((p.epm+3.5)*Math.max(p.season.min,1))/Math.max(tot,1); };
  const score = p => (p.epm * p.season.min)/100 + wsOf(p)*2;
  const dscore = p => ((p.de||0) * p.season.min)/100 + wsOf(p)*0.6;
  const byS=[...all].sort((a,b)=>score(b)-score(a));
  const byD=[...all].sort((a,b)=>dscore(b)-dscore(a));
  const rooks = all.filter(p=>p.rookie).sort((a,b)=>score(b)-score(a));
  const allstar = c => all.filter(p=>DATA.teams[p.tm].conf===c).sort((a,b)=>score(b)-score(a)).slice(0,12);
  S.awards = {
    mvpTop: byS.slice(0,5).map(p=>({n:p.n,tm:p.tm,id:p.id,sc:Math.round(score(p)*10)/10, a:avgStat(p.season), epm:p.epm})),
    dpoy: byD.slice(0,3).map(p=>({n:p.n,tm:p.tm,de:p.de, a:avgStat(p.season)})),
    roy: rooks.slice(0,3).map(p=>({n:p.n,tm:p.tm, a:avgStat(p.season)})),
    allNba: [byS.slice(0,5),byS.slice(5,10),byS.slice(10,15)].map(t=>t.map(p=>p.n+' ('+p.tm+')')),
    allStar: {Est:allstar('Est').map(p=>p.n), Ouest:allstar('Ouest').map(p=>p.n)}
  };
}

// ============ Intersaison suivante ============
function nextSeason(){
  S.yr++;
  // ---- Contrats : décompte, prolongations qui s'activent, expirations → Free Agency ----
  for(const p of Object.values(S.players)){
    if(p.tm==='FA') continue;
    p.yrs = (p.yrs||1) - 1;
    p.negoCount=0; p.negoLock=false; p.promise=null;
    if(p.yrs<=0){
      if(p.ext){ p.sal=p.ext.sal; p.yrs=p.ext.yrs; p.ct=`Prolongation ${S.yr}`; p.ext=null; continue; }
      if(p.tm!==S.user && p.epm>=1.2 && chance(0.62)){
        const nv = mktValue({epm:p.epm, age:p.age, aav:p.sal});
        const ny = p.age<=27?4: p.age<=31?3:2;
        p.sal=nv; p.yrs=ny; p.ct=`Re-signé ${S.yr}`;
        if(p.epm>=2.5) pushNews('fa', `${p.n} re-signe à ${p.tm} (${ny} ans, ${fmtM(nv)}/an).`);
        continue;
      }
      const from=p.tm;
      p.aav=p.sal; p.sal=0; p.tm='FA'; p.yrs=0; p.ct='Free Agent';
      if(!S.fa.includes(p.id)) S.fa.push(p.id);
      if(p.epm>=2.0) pushNews('woj', `<b>Free Agency :</b> ${p.n} (ex-${from}) arrive sur le marché !`);
    }
  }
  purgeUserMins();
  for(const p of Object.values(S.players)){
    p.age++;
    // 1) L'EPM devient la résultante mathématique des stats de la saison écoulée
    const fs = epmFromStats(p);
    if(fs){
      p.oe = Math.round((fs.oe*0.75 + p.oe*0.25)*10)/10; // lissage léger anti-aberration
      p.de = Math.round((fs.de*0.75 + p.de*0.25)*10)/10;
    }
    // 2) Puis la courbe d'âge × tendance historique × temps de jeu s'applique
    let d = campProgress(p);
    if(d>0) d = Math.round(d * devMinutesFactor(p) * 10)/10; // gros temps de jeu ⇒ progression accrue
    const sp = splitOD(p, d);
    p.oe = Math.round((p.oe + sp.dO)*10)/10;
    p.de = Math.round((p.de + sp.dD)*10)/10;
    p.epm = Math.round((p.oe + p.de)*10)/10;
    p.season=zeroStat(); p.playoffs=zeroStat(); p.fatigue=0; p.inj=null; p._bk=null; p.rookie=false;
  }
  // ---- Draft de l'année : classe réelle (2028/2029) ou générée (2027, 2030+) ----
  const cls = (DATA.classes && DATA.classes[String(S.yr)] && DATA.classes[String(S.yr)].length)
    ? DATA.classes[String(S.yr)].map(x=>({...x}))
    : genDraftClass(S.yr);
  S.draftOrder = buildDraftOrder(S.yr);           // loterie sur les bilans finaux, AVANT reset
  maybeGenerational(cls, S.yr);
  S.prospects = cls.map(x=>({...x, drafted:null}));
  S.draftIdx=0; S.drafted=[];
  // fenêtre de picks glissante : l'année consommée sort, S.yr+6 entre
  for(const ab of Object.keys(DATA.teams)){
    delete S.picks[ab][S.yr];
    S.picks[ab][S.yr+6] = {r1:ab, r2:ab};
  }
  for(const ab of Object.keys(DATA.teams)){ S.standings[ab]={w:0,l:0}; S.seasonGames[ab]=0; }
  S.phase='DRAFT'; S.blockIdx=0; S.faWave=0; S.marketDone=false; S.campDone=false; S.deadlinePassed=false;
  S.bracket=null; S.champion=null; S.awards=null; S.proposals=[]; S.curBlock=null; S.stratCache={};
  S.strategies={off:null,def:null};
  pushNews('info', `<b>Saison ${S.yr}-${(S.yr+1)%100} :</b> la draft ${S.yr} ouvre l'intersaison (${S.prospects.length} prospects).`);
}

// ============ Analyse de Talents (Scouting Report) ============
function scoutProfile(x){
  const big = posMap(x.pos)==='C'||posMap(x.pos)==='PF', guard = posMap(x.pos)==='PG'||posMap(x.pos)==='SG';
  const F=[], W=[];
  if(x.gen) F.push('Talent générationnel — profil qui redéfinit une franchise');
  if(x.ts>=60) F.push('Finition très efficace (TS '+x.ts.toFixed(1)+'%)');
  if(x.ppg>=18) F.push('Scoreur à gros volume ('+x.ppg.toFixed(1)+' pts)');
  if(x.apg>=4) F.push('Vraie création pour les autres ('+x.apg.toFixed(1)+' passes)');
  if(x.spg>=1.4) F.push('Mains très actives ('+x.spg.toFixed(1)+' int.)');
  if(x.bpg>=1.2) F.push('Protection de cercle ('+x.bpg.toFixed(1)+' ctr)');
  if(x.rpg>=7) F.push('Présence dominante au rebond ('+x.rpg.toFixed(1)+' rbd)');
  if(x.age<=19.5) F.push('Très jeune pour sa classe — marge de progression maximale');
  if(x.legacy) F.push('Pedigree NBA : '+x.legacy);
  if(!F.length) F.push('Profil complet sans déséquilibre majeur');
  if(x.topg>=2.2) W.push('Pertes de balle fréquentes ('+x.topg.toFixed(1)+'/m)');
  if(x.ts<52) W.push('Efficacité au tir à construire (TS '+x.ts.toFixed(1)+'%)');
  if(x.age>=23) W.push('Déjà âgé ('+x.age+' ans) — plafond limité');
  if(big && x.bpg<0.6) W.push('Dissuasion intérieure limitée pour son poste');
  if(guard && x.apg<1.5) W.push('Playmaking embryonnaire pour un extérieur');
  if(!big && !guard && x.spg<0.5 && x.bpg<0.5) W.push('Faible activité défensive');
  if(x.ppg<7) W.push('Production offensive confidentielle en universitaire');
  if(!W.length) W.push('Peu de failles identifiées par les scouts');
  const tiers = ['Fond de banc','Rotation','6e homme','Titulaire solide','All-Star','All-NBA','Visage de franchise'];
  let c = x.bpm>=13?6 : x.bpm>=10?5 : x.bpm>=8?4 : x.bpm>=6?3 : x.bpm>=4?2 : x.bpm>=2?1 : 0;
  if(x.age<=19.6 && c<6) c++;
  if(x.age>=23 && c>0) c--;
  if(x.age>=24 && c>0) c--;   // senior : la marge de progression est consommée
  let f = Math.max(0, c - (x.age<=20 ? 3 : 2));
  return {forces:F, faiblesses:W, plafond:tiers[c], plancher:tiers[f], proj:rookieEpm(x.bpm, x.age)};
}
// Mock draft : projection pick par pick (besoins d'équipe + talent), sans rien consommer
function mockDraft(){
  let order = (S.phase==='DRAFT' && S.draftOrder.length) ? S.draftOrder.slice(S.draftIdx)
    : (S.draftOrder.length && S.prospects.some(x=>!x.drafted)) ? S.draftOrder : null;
  const pool = S.prospects.filter(x=>!x.drafted).sort((a,b)=>draftValue(b)-draftValue(a));
  if(!order) order = pool.slice(0,30).map((_,i)=>({pick:i+1, tm:'—', via:null}));
  const taken = new Set(); const rows=[];
  for(const slot of order.slice(0,30)){
    const needs = slot.tm!=='—' ? teamNeeds(slot.tm) : [];
    let best=null, bs=-99;
    for(const x of pool){
      if(taken.has(x.id)) continue;
      const s = draftValue(x) + (needs.includes(posMap(x.pos))?1.2:0);
      if(s>bs){ bs=s; best=x; }
    }
    if(!best) break;
    taken.add(best.id);
    rows.push({slot, x:best});
  }
  return rows;
}

// ============ News ============
function pushNews(type, html){
  S.news.unshift({type, html, t:Date.now()});
  if(S.news.length>120) S.news.pop();
  if(typeof updateTicker==='function') updateTicker();
}
/*ENGINE_END*/

</script>
<script>
/*UI_START*/
"use strict";
const $ = id => document.getElementById(id);
const UI = {tab:'home', trade:{team:null, out:new Set(), inn:new Set(), pOut:new Set(), pInn:new Set()}, faSort:'epm', faPos:'ALL', lastReport:null, lastCamp:null, lastInjury:null, lastBoxGame:null, leagueView:'standings', leagueTeam:null, leaderStat:'ppg'};

function esc(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function epmCls(e){ return e>=1.5?'epm-pos': e<=-1?'epm-neg':'epm-mid'; }
function fmtEpm(e){ return (e>0?'+':'')+e.toFixed(1); }
function pct(v){ return v>0? (v*100).toFixed(1)+'%':'—'; }
function f1(v){ return v.toFixed(1); }
function teamLabel(ab){ return `<span style="border-left:3px solid ${DATA.teams[ab].c1};padding-left:5px">${ab}</span>`; }
function flame(p){ return (p.epm>=2.5||p.tradeReq)? `<span class="fire">${p.tradeReq?'⚠':'🔥'}</span> `:''; }

const PHASE_LABEL = {PICK_TEAM:'Accueil', DRAFT:'Draft', FA:'Free Agency', MARKET:'Marché des transferts', CAMP:'Training Camp', SEASON:'Saison régulière', PLAYOFFS:'Playoffs', AWARDS:'Récompenses'};

function updateTicker(){
  const last = S && S.news.slice(0,5).map(n=>n.html.replace(/<[^>]+>/g,'')).join('  ···  ');
  if(last) $('tickertxt').textContent = last;
}
function openModal(title, html){ $('mtitle').innerHTML=title; $('mcontent').innerHTML=html; $('modal').classList.add('on'); }
function closeModal(){ $('modal').classList.remove('on'); }
$('modal').addEventListener('click', e=>{ if(e.target.id==='modal') closeModal(); });

// ============ Rendu global ============
function renderAll(){
  $('phasechip').textContent = PHASE_LABEL[S.phase]||S.phase;
  renderTop(); renderTabs();
  const v=$('view');
  if(S.phase==='PICK_TEAM'){ v.innerHTML = screenPickTeam(); return; }

  v.innerHTML = (map[UI.tab]||screenHome)();
  window.scrollTo(0,0);
}
function renderTop(){
  if(!S.user){ $('topinfo').innerHTML=''; return; }
  const st=S.standings[S.user], pay=payroll(S.user);
  $('topinfo').innerHTML = `<span>${DATA.teams[S.user].name}</span><span>Bilan <b>${st.w}-${st.l}</b></span><span>Masse <b>${fmtM(pay)}</b></span><span>${taxStatus(S.user)}</span>`;
}
function renderTabs(){
  if(!S.user){ $('tabs').innerHTML=''; return; }

function homeSeason(){
  let html='';

  const done = S.blockIdx>=S.blockPlan.length;

    const sel = (id,list,cur)=>`<select id="${id}" onchange="S.strategies.${id==='soff'?'off':'def'}=this.value">${list.map(o=>`<option ${o===cur?'selected':''}>${o}</option>`).join('')}</select>`;
    if(!S.strategies.off){ S.strategies.off=OFF_STRATS[2]; S.strategies.def=DEF_STRATS[0]; }
    const sm = strategyMod(S.user, S.strategies.off, S.strategies.def);
    html += panel('A',`Bloc ${S.blockIdx+1} / 4 — ${cb.len} matchs`, `
      <div class="grid2">
        <div><label class="fl">Stratégie offensive</label>${sel('soff',OFF_STRATS,S.strategies.off)}</div>

function screenRotation(){
  const rs = roster(S.user).sort((a,b)=>effEpm(b)-effEpm(a));
  const manual = !!S.userMins;
  const eff = minutesAlloc(S.user);                 // minutes effectives (normalisées 240)
  const raw = S.userMins || autoMinsTemplate(S.user, false);
  let tot=0; for(const p of rs) if(!p.inj) tot += (raw[p.id]||0);
  const rows = rs.map(p=>{
    const v = p.inj? 0 : Math.round(raw[p.id]||0);
    const a = p.season.gp>0? avgStat(p.season):null;
    return `<tr><td class="pname" onclick="openPlayer(${p.id})">${flame(p)}${esc(p.n)}${p.inj?` <span class="tag red">OUT</span>`:''}</td>

  return `<div class="panel"><div class="ph"><h2>Rotation — ${manual?'manuelle':'automatique'}</h2>

function renderTradeBuilder(){
  const T=UI.trade;
