  const pickList = (ab, set, side)=> [2027,2028,2029,2030].filter(y=>S.picks[ab][y].r1===ab).map(y=>`<label class="chkline"><input type="checkbox" ${set.has(y)?'checked':''} onchange="togglePick('${side}',${y})"><span>1er tour ${y}</span></label>`).join('');
  let verdict='';
  if(T.team){
    const outA=[...T.out].map(i=>S.players[i]), outB=[...T.inn].map(i=>S.players[i]);
    const pA=[...T.pOut].map(yr=>({yr})), pB=[...T.pInn].map(yr=>({yr}));
    const errs = validateTrade(S.user, T.team, outA, outB, pA, pB);
    const salA=outA.reduce((s,p)=>s+p.sal,0), salB=outB.reduce((s,p)=>s+p.sal,0);
    verdict = `<p style="margin:8px 0">Sortant : <b class="gold">${fmtM(salA)}</b> · Entrant : <b class="gold">${fmtM(salB)}</b> · Budget trade : <b class="${salB-salA>0?'red':'teal'}">${fmtM(salB-salA)}</b></p>`;
    if(errs.length) verdict += errs.map(e=>`<p class="red">✕ ${e}</p>`).join('');
    else {
      const acc = aiAccepts(T.team, outA, outB, pA, pB);
      verdict += acc.ok? `<p class="teal">✓ Légal (CBA + Stepien). ${T.team} accepte ce trade.</p><div class="btnrow"><button class="btn p" onclick="submitTrade()">Valider le trade</button></div>`
        : `<p class="orange">Légal, mais ${acc.why}</p>`;
    }
  }
  openModal('Construire un trade', teamSel + (T.team? `
    <div class="grid2" style="margin-top:10px">
      <div><label class="fl">Tu envoies (${S.user})</label>${list(S.user,T.out,'out')}${pickList(S.user,T.pOut,'pout')}</div>
      <div><label class="fl">Tu reçois (${T.team})</label>${list(T.team,T.inn,'inn')}${pickList(T.team,T.pInn,'pinn')}</div>
    </div>`+verdict : ''));
}

// Leaders statistiques de la ligue. Avant la saison : repli sur l'EPM.
function leagueLeaders(stat, n){
  const all = Object.values(S.players).filter(p=>p.tm!=='FA'&&p.tm!=='RET');
  const played = all.some(p=>p.season.gp>=1);
  if(!played || stat==='epm'){
    return all.slice().sort((a,b)=>b.epm-a.epm).slice(0,n).map(p=>({p, v:p.epm, fmt:fmtEpm(p.epm)}));
  }
  const minGp = Math.min(10, Math.max(...all.map(p=>p.season.gp)) ? Math.floor(Math.max(...all.map(p=>p.season.gp))*0.5) : 1);
  const elig = all.filter(p=>p.season.gp>=Math.max(1,minGp));
  const getv = (p)=>{ const a=avgStat(p.season);
    return stat==='ppg'?a.ppg:stat==='rpg'?a.rpg:stat==='apg'?a.apg:stat==='spg'?a.spg:stat==='bpg'?a.bpg:stat==='fg3'?a.fg3:a.ppg; };
  const isPct = stat==='fg3';
  return elig.filter(p=>!isPct||avgStat(p.season).fg3>0).sort((a,b)=>getv(b)-getv(a)).slice(0,n)
    .map(p=>({p, v:getv(p), fmt:isPct?pct(getv(p)):f1(getv(p))}));
}

  if(UI.leagueTeam) return leagueTeamView(UI.leagueTeam);

  return panel('A','Conférence Est', nav+tbl('Est')) + panel('A','Conférence Ouest', tbl('Ouest'));

function doOffer(id){
  const f=S.players[id];
  const yrs=+$('fayrs').value, sal=Math.round(+$('fasal').value*1000000);
  const r = offerFA(f, yrs, sal);
  openModal(r.ok?'Signature !':'Offre déclinée', `<p class="${r.ok?'teal':'red'}">${r.msg}</p>`);
  renderAll();
}
function resolveProp(id, act){
  const pr = S.proposals.find(x=>x.id===id); if(!pr) return;
  if(act==='ref'){ pr.resolved=true; renderAll(); return; }
  if(act==='neg'){
    const r=negotiateProposal(pr);
    openModal('Négociation', `<p class="${r.ok?'teal':'mut'}">${r.msg}</p>`); renderAll(); return;
  }
  const get=pr.get.map(i=>S.players[i]), give=pr.give.map(i=>S.players[i]);
  const picksGet=pr.picksGet||[], picksGive=pr.picksGive||[];
  const errs = validateTrade(pr.from, S.user, get, give, picksGet, picksGive);
  if(errs.length){ openModal('Trade impossible', errs.map(e=>`<p class="red">${e}</p>`).join('')); pr.resolved=true; renderAll(); return; }
  executeTrade(pr.from, S.user, get, give, picksGet, picksGive);
  pr.resolved=true; renderAll();
}

// ============ Draft ============
function screenDraft(){
  const nav = `<div class="btnrow" style="margin-bottom:10px">
    <button class="btn sm ${UI.draftView!=='scout'?'p':''}" onclick="UI.draftView='board';renderAll()">Board</button>
    <button class="btn sm ${UI.draftView==='scout'?'p':''}" onclick="UI.draftView='scout';renderAll()">Scouting Report</button></div>`;
  if(UI.draftView==='scout') return screenScouting(nav);
  if(S.phase==='DRAFT'){
    const next = S.draftOrder[S.draftIdx];
    const userTurn = next && next.tm===S.user;
    const board = S.prospects.filter(x=>!x.drafted).sort((a,b)=>draftValue(b)-draftValue(a)).slice(0,40)
      .map(x=>`<tr class="rowc" onclick="openProspect(${x.id})"><td class="pname">${x.gen?'<span class="fire">💎</span> ':''}${esc(x.n)}${x.legacy?' <span class="tag gold">héritier</span>':''}</td><td><span class="pos-chip">${posMap(x.pos)}</span></td>
        <td class="num ${x.age<=20?'teal':x.age>=23?'mut':''}">${x.age.toFixed(1)}</td><td class="mut">${esc(x.school)}</td><td class="num gold">${x.bpm.toFixed(1)}</td><td class="num">${f1(x.ppg)}</td><td class="num">${f1(x.rpg)}</td><td class="num">${f1(x.apg)}</td></tr>`).join('');
    const picked = S.drafted.slice(-8).reverse().map(d=>`<div class="newsitem">${d.pick}. <b>${d.tm}</b> — ${esc(d.n)}</div>`).join('');
    return panel('A', userTurn?`À toi de choisir — pick n°${next.pick}`:`Draft ${S.yr} ${next?`— prochain pick : ${next.tm} (n°${next.pick})`:''}`, nav+`
      ${userTurn?'<p class="teal">Touche un prospect pour voir sa fiche et le sélectionner.</p>':`<div class="btnrow"><button class="btn p" onclick="advanceDraft()">Simuler jusqu'à mon pick</button></div>`}
      <div class="scroll-x" style="margin-top:8px"><table><tr><th>Prospect</th><th>Pos</th><th class="num">Âge</th><th>École</th><th class="num">BPM</th><th class="num">PPG</th><th class="num">RPG</th><th class="num">APG</th></tr>${board}</table></div>`)
      + (picked? panel('B','Derniers picks', picked):'');
  }
  const mine = S.drafted.filter(d=>d.tm===S.user);
  return panel('A',`Draft ${S.yr} — terminée`, nav+(mine.length? `<p>Tes sélections :</p>`+mine.map(d=>`<div class="newsitem t">Pick ${d.pick} — <b>${esc(d.n)}</b></div>`).join('') : '<p class="mut">Aucun pick cette année.</p>'));
}
function screenScouting(nav){
  const md = mockDraft();
  if(!md.length) return panel('A','Analyse de Talents', nav+'<p class="mut">Aucun prospect au board pour le moment — le rapport se remplira à l\'ouverture de la prochaine draft.</p>');
  const rows = md.map(({slot,x})=>{
    const sp = scoutProfile(x);
    return `<tr class="rowc" onclick="openProspect(${x.id})"><td class="num mut">${slot.pick}</td><td>${slot.tm==='—'?'<span class="mut">—</span>':teamLabel(slot.tm)}</td>
    <td class="pname">${x.gen?'<span class="fire">💎</span> ':''}${esc(x.n)}${x.legacy?' <span class="tag gold">héritier</span>':''}</td>
    <td><span class="pos-chip">${posMap(x.pos)}</span></td><td class="num ${x.age<=20?'teal':x.age>=23?'mut':''}">${x.age.toFixed(1)}</td><td class="num gold">${x.bpm.toFixed(1)}</td><td class="mut">${esc(sp.plafond)}</td></tr>`;
  }).join('');
  const gem = md.find(e=>e.x.gen);
  return panel('A',`Analyse de Talents — Mock Draft`, nav+
    (gem?`<div class="newsitem g"><b>💎 ${esc(gem.x.n)}</b> est considéré comme un talent générationnel — un profil qui n'apparaît qu'une fois tous les 5 à 10 ans.</div>`:'')+
    `<p class="mut">Projection pick par pick (talent × besoins d'équipe). Touche un prospect pour son rapport complet.</p>
    <div class="scroll-x"><table><tr><th class="num">Pick</th><th>Équipe</th><th>Prospect</th><th>Pos</th><th class="num">Âge</th><th class="num">BPM</th><th>Plafond</th></tr>${rows}</table></div>`);
}
function advanceDraft(){
  const next = simDraftUntilUser();
  if(!next){ UI.tab='home'; }
  renderAll();
}
function openProspect(id){
  const x = S.prospects.find(p=>p.id===id);
  const userTurn = S.phase==='DRAFT' && S.draftOrder[S.draftIdx] && S.draftOrder[S.draftIdx].tm===S.user;
  const sp = scoutProfile(x);
  openModal(`${x.gen?'💎 ':''}${esc(x.n)} <span class="tag">${posMap(x.pos)}</span>${x.legacy?` <span class="tag gold">${esc(x.legacy)}</span>`:''}`, `
    <div class="statgrid">
      <div class="statbox"><div class="l">BPM</div><div class="v">${x.bpm.toFixed(1)}</div></div>
      <div class="statbox"><div class="l">Âge</div><div class="v w">${x.age}</div></div>
      <div class="statbox"><div class="l">Taille</div><div class="v w">${esc(x.ht)}</div></div>
      <div class="statbox"><div class="l">TS%</div><div class="v w">${x.ts.toFixed(1)}</div></div>
      <div class="statbox"><div class="l">EPM projeté</div><div class="v t">${fmtEpm(sp.proj)}</div></div>
      <div class="statbox"><div class="l">PPG</div><div class="v w">${f1(x.ppg)}</div></div>
      <div class="statbox"><div class="l">RPG</div><div class="v w">${f1(x.rpg)}</div></div>
      <div class="statbox"><div class="l">APG</div><div class="v w">${f1(x.apg)}</div></div>
    </div>
    <div class="statgrid" style="margin-top:8px">
      <div class="statbox"><div class="l">Plancher</div><div class="v w">${esc(sp.plancher)}</div></div>
      <div class="statbox"><div class="l">Plafond</div><div class="v t">${esc(sp.plafond)}</div></div>
    </div>
    <p style="margin:10px 0 4px"><b class="teal">Points forts</b></p>${sp.forces.map(f=>`<div class="newsitem t">${esc(f)}</div>`).join('')}
    <p style="margin:10px 0 4px"><b class="gold">Points faibles</b></p>${sp.faiblesses.map(f=>`<div class="newsitem">${esc(f)}</div>`).join('')}
    <p class="mut" style="margin-top:8px">${esc(x.school)}</p>
    ${userTurn?`<div class="btnrow"><button class="btn p" onclick="userPick(${x.id})">Sélectionner au pick ${S.draftOrder[S.draftIdx].pick}</button></div>`:''}`);
}
function userPick(id){
  const x=S.prospects.find(p=>p.id===id);
  doDraftPick(x); closeModal();
  const next = simDraftUntilUser();
  if(!next) UI.tab='home';
  renderAll();
}

// ============ Playoffs (bracket image 1 + séries) ============
function screenPlayoffs(){
  if(!S.bracket) return panel('A','Playoffs','<p class="mut">La saison régulière n\'est pas terminée.</p>');
  let html = bracketHtml();
  const my = userSeries();
  if(S.champion){
    html += panel('A',`🏆 ${DATA.teams[S.champion].name}, champion ${S.yr+1}`, `<div class="btnrow"><button class="btn g" onclick="S.phase='AWARDS';UI.tab='home';renderAll()">Voir les récompenses</button></div>`);
  } else if(my){
    html += seriesPanel(my);
  } else {
    html += panel('A', userEliminated()?'Ton équipe est éliminée':'Séries en cours', `<div class="btnrow"><button class="btn p" onclick="simAiSeries();renderAll()">Simuler la prochaine série IA</button>
      <button class="btn" onclick="while(simAiSeries()){};renderAll()">Simuler tout le tour</button></div>`);
  }
  return html;
}
function bracketHtml(){
  const B=S.bracket;
  const trow=(se,ab,w)=>{ const t=DATA.teams[ab]; const seed=(B.E.seeds.indexOf(ab)+1)||(B.O.seeds.indexOf(ab)+1);
    return `<div class="trow ${se.done&&se.winner===ab?'win':''}"><span class="tbar" style="background:${t.c1}"></span><span class="seed">${seed}</span><span class="tn">${ab}</span><span class="sc">${w}</span></div>`; };
  const m=se=> se? `<div class="match">${trow(se,se.hi,se.wh)}${trow(se,se.lo,se.wl)}</div>` : `<div class="match"><div class="trow mut" style="justify-content:center">—</div></div>`;
  const col=(title,arr)=>`<div class="bcol"><h3>${title}</h3>${arr.map(m).join('')}</div>`;
  return `<div class="panel"><div class="ph"><h2>NBA Playoffs ${S.yr+1}</h2></div><div id="bracketwrap"><div class="bracket">
    ${col('Ouest — 1er tour',B.O.r1)}${col('Demi-finales',B.O.sf.length?B.O.sf:[null,null])}${col('Finale Ouest',[B.O.cf])}
    ${col('Finales NBA',[B.finals])}
    ${col('Finale Est',[B.E.cf])}${col('Demi-finales',B.E.sf.length?B.E.sf:[null,null])}${col('Est — 1er tour',B.E.r1)}
  </div></div></div>`;
}
function seriesPanel(se){
  const opp = se.hi===S.user? se.lo : se.hi;
  const roundName=['','1er tour','Demi-finale de conférence','Finale de conférence','Finales NBA'][se.round];
  let html='';
  if(!S.seriesPrep || S.seriesPrep.series!==se){
    html += seriesRecapHtml(se);
    // préparation de série
    const threats = roster(opp).filter(p=>!p.inj).sort((a,b)=>(b.oe||0)-(a.oe||0)).slice(0,3);
    const defs = roster(S.user).filter(p=>!p.inj).sort((a,b)=>(b.de||0)-(a.de||0)).slice(0,8);
    if(!UI.prepSel) UI.prepSel={};
    const rows = threats.map((t,i)=>`<tr><td class="pname">${esc(t.n)} <span class="mut">(O-EPM ${fmtEpm(t.oe||0)})</span></td>
      <td><select id="as${i}">${defs.map(d=>`<option value="${d.id}">${esc(d.n)} (D ${fmtEpm(d.de||0)})</option>`).join('')}</select></td></tr>`).join('');
    html += panel('A',`Préparation — ${roundName} vs ${opp}`, `
      <p class="mut">Assigne tes défenseurs aux menaces adverses (mauvaise assignation = bonus adverse).</p>
      <div class="scroll-x"><table><tr><th>Menace ${opp}</th><th>Ton défenseur</th></tr>${rows}</table></div>
      <div class="grid2" style="margin-top:8px">
        <div><label class="fl">Stratégie offensive</label><select id="poff">${OFF_STRATS.map(o=>`<option ${S.strategies.off===o?'selected':''}>${o}</option>`).join('')}</select></div>
        <div><label class="fl">Stratégie défensive</label><select id="pdef">${DEF_STRATS.map(o=>`<option ${S.strategies.def===o?'selected':''}>${o}</option>`).join('')}</select></div>
      </div>
      <p class="mut" style="margin-top:6px">Rotation auto sur 240 minutes (les blessés sont exclus).</p>
      <div class="btnrow"><button class="btn p" onclick="lockPrep('${threats.map(t=>t.id).join('_')}')">Valider le plan de série</button></div>`);
    return html;
  }
  // série en cours
  const last = se.games[se.games.length-1];
  html += panel('A',`${roundName} — ${se.hi} ${se.wh} · ${se.wl} ${se.lo}`, `
    ${se.games.map(g=>`<div class="newsitem ${g.win===S.user?'t':''}">Match ${g.g} : ${se.hi} ${g.sa} – ${g.sb} ${se.lo} ${g.win===S.user?'✓':''}</div>`).join('')}
    <div class="btnrow">
      ${!se.done?`<button class="btn p" onclick="simSeriesGame(userSeries());renderAll()">Jouer le prochain match</button>
      <button class="btn" onclick="simSeriesToEnd(userSeries());renderAll()">Simuler la série</button>`:''}
      ${last&&last.boxA?`<button class="btn g" onclick="showBox(${se.games.length-1})">Fiche du dernier match</button>`:''}
    </div>`);
  return html;
}
function seriesRecapHtml(cur){
  const prevs = allSeries().filter(s=>s.done && (s.hi===S.user||s.lo===S.user) && s.round<cur.round && s.games.length && s.games[0].boxA);
  if(!prevs.length) return '';
  const se = prevs.sort((a,b)=>a.round-b.round).pop();
  const roundName=['','1er tour','Demi-finale de conférence','Finale de conférence','Finales NBA'][se.round];
  const userIsHi = se.hi===S.user;
  const agg={};
  for(const g of se.games){
    const box = userIsHi? g.boxA : g.boxB; if(!box) continue;
    for(const l of box){
      const a = agg[l.n] || (agg[l.n]={gp:0,min:0,pts:0,reb:0,ast:0,stl:0,blk:0,fgm:0,fga:0,tpm:0,tpa:0,ftm:0,fta:0});
      a.gp++; for(const k of ['min','pts','reb','ast','stl','blk','fgm','fga','tpm','tpa','ftm','fta']) a[k]+=l[k]||0;
    }
  }
  const rows = Object.entries(agg).sort((a,b)=>b[1].pts/b[1].gp - a[1].pts/a[1].gp).map(([n,a])=>{
    const pg=k=>(a[k]/a.gp).toFixed(1);
    return `<tr><td class="pname">${esc(n)}</td><td class="num">${pg('min')}</td><td class="num gold">${pg('pts')}</td><td class="num">${pg('reb')}</td><td class="num">${pg('ast')}</td><td class="num">${pg('stl')}</td><td class="num">${pg('blk')}</td>
      <td class="num">${a.fga? (100*a.fgm/a.fga).toFixed(1):'—'}</td><td class="num">${a.tpa? (100*a.tpm/a.tpa).toFixed(1):'—'}</td><td class="num">${a.fta? (100*a.ftm/a.fta).toFixed(1):'—'}</td></tr>`;
  }).join('');
  const sc = userIsHi? `${se.wh}-${se.wl}` : `${se.wl}-${se.wh}`;
  return panel('B', `Récap — ${roundName} : ${se.winner===S.user?'victoire':'défaite'} ${sc} vs ${userIsHi?se.lo:se.hi}`, `
    ${se.games.map(g=>`<span class="mut" style="margin-right:8px">M${g.g} ${g.sa}-${g.sb}</span>`).join('')}
    <div class="scroll-x" style="margin-top:6px"><table>
      <tr><th>Joueur</th><th class="num">Min</th><th class="num">PPG</th><th class="num">RPG</th><th class="num">APG</th><th class="num">SPG</th><th class="num">BPG</th><th class="num">FG%</th><th class="num">3P%</th><th class="num">LF%</th></tr>
      ${rows}</table></div>`);
}
function lockPrep(idsStr){
  const se=userSeries(); if(!se) return;
  const threatIds = idsStr.split('_').map(Number);
  const assign = threatIds.map((tid,i)=>({threat:tid, def:+$('as'+i).value}));
  S.strategies.off=$('poff').value; S.strategies.def=$('pdef').value;
  S.seriesPrep={series:se, assign};
  renderAll();
}
function showBox(gi){
  const se=userSeries()||allSeries().filter(s=>s.hi===S.user||s.lo===S.user).pop();
  const g=se.games[gi]; if(!g||!g.boxA) return;
  const tbl=(ab,box)=>`<h3 style="margin:8px 0 4px">${ab}</h3><div class="scroll-x"><table>
    <tr><th>Joueur</th><th class="num">Min</th><th class="num">Pts</th><th class="num">Rbds</th><th class="num">Pds</th><th class="num">Int</th><th class="num">Ctr</th><th class="num">FG</th><th class="num">3P</th><th class="num">LF</th></tr>
    ${box.map(l=>`<tr><td class="pname">${esc(l.n)}</td><td class="num">${Math.round(l.min)}</td><td class="num gold">${Math.round(l.pts)}</td><td class="num">${Math.round(l.reb)}</td><td class="num">${Math.round(l.ast)}</td><td class="num">${Math.round(l.stl)}</td><td class="num">${Math.round(l.blk)}</td>
    <td class="num">${Math.round(l.fgm)}/${Math.round(l.fga)}</td><td class="num">${Math.round(l.tpm)}/${Math.round(l.tpa)}</td><td class="num">${Math.round(l.ftm)}/${Math.round(l.fta)}</td></tr>`).join('')}</table></div>`;
  openModal(`Fiche de match ${gi+1} — ${se.hi} ${g.sa} · ${g.sb} ${se.lo}`,
    tbl(se.hi,g.boxA)+tbl(se.lo,g.boxB)+
    (g.notes&&g.notes.length?`<h3 style="margin:8px 0 4px">Analyse coaching</h3>${g.notes.map(n=>`<div class="newsitem t">${esc(n)}</div>`).join('')}`:''));
}

// ============ News ============
function screenNews(){
  return panel('B','Fil d\'actualité', S.news.map(n=>`<div class="newsitem ${n.type==='fa'?'t':n.type==='draft'?'g':''} ${n.type==='woj'?'woj':''}">${n.html}</div>`).join('')||'<p class="mut">Rien à signaler.</p>');
}

// ============ Boot ============
newGame();
renderAll();
